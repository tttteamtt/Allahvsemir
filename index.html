<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allah vs Emir - Canlı Savaş Yayını</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 10px;
            padding: 10px;
        }

        /* SOL PANEL - ALLAH TAKIMI */
        .left-panel {
            background: linear-gradient(135deg, rgba(0, 50, 100, 0.9) 0%, rgba(15, 30, 50, 0.95) 100%);
            border: 2px solid #00d4ff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            overflow: hidden;
        }

        /* SAĞ PANEL - EMİR TAKIMI */
        .right-panel {
            background: linear-gradient(135deg, rgba(100, 20, 20, 0.9) 0%, rgba(50, 15, 15, 0.95) 100%);
            border: 2px solid #ff1744;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(255, 23, 68, 0.3);
            overflow: hidden;
        }

        .panel-header {
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid currentColor;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 0 0 10px currentColor;
        }

        .left-panel .panel-header {
            color: #00d4ff;
        }

        .right-panel .panel-header {
            color: #ff1744;
        }

        .team-stats {
            padding: 15px;
            border-bottom: 2px solid currentColor;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }

        .left-panel .stat-line {
            color: #00d4ff;
        }

        .right-panel .stat-line {
            color: #ff1744;
        }

        .stat-value {
            font-weight: bold;
            font-size: 18px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .chat-message {
            padding: 8px 10px;
            border-radius: 6px;
            border-left: 3px solid;
            font-size: 12px;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
            line-height: 1.3;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-bottom: 2px;
        }

        .allah-message {
            background: rgba(0, 212, 255, 0.15);
            border-left-color: #00d4ff;
            color: #00d4ff;
        }

        .emir-message {
            background: rgba(255, 23, 68, 0.15);
            border-left-color: #ff1744;
            color: #ff1744;
        }

        .neutral-message {
            background: rgba(0, 255, 136, 0.1);
            border-left-color: #00ff88;
            color: #00ff88;
        }

        /* ORTA ALAN */
        .center-panel {
            background: linear-gradient(135deg, #1a2840 0%, #0f1520 100%);
            border: 2px solid #00ff88;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 2px solid #00ff88;
            background: rgba(10, 14, 27, 0.7);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff1744;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }

        .clock {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
            font-family: 'Courier New', monospace;
        }

        .title {
            flex: 1;
            text-align: center;
            color: #d4af37;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #battlefieldCanvas {
            flex: 1;
            display: block;
        }

        .battle-controls {
            padding: 10px;
            border-top: 2px solid #00ff88;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .control-btn {
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            border: none;
            color: #0a0e27;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.6);
        }

        .winner-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.99) 0%, rgba(26, 31, 46, 0.99) 100%);
            border: 3px solid #d4af37;
            padding: 50px 80px;
            border-radius: 20px;
            z-index: 200;
            color: #d4af37;
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            display: none;
            animation: winnerShow 0.8s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(212, 175, 55, 0.4);
            backdrop-filter: blur(10px);
        }

        @keyframes winnerShow {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 3px;
        }

        .allah-leading {
            border-color: #00d4ff !important;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5) !important;
        }

        .emir-leading {
            border-color: #ff1744 !important;
            box-shadow: 0 0 30px rgba(255, 23, 68, 0.5) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SOL PANEL - ALLAH ORDUSU -->
        <div class="left-panel">
            <div class="panel-header">🔵 ALLAH ORDUSU</div>
            <div class="team-stats">
                <div class="stat-line">
                    <span>Askerler:</span>
                    <span class="stat-value" id="allahCount">50</span>
                </div>
                <div class="stat-line">
                    <span>Güç:</span>
                    <span class="stat-value" id="allahPower">100%</span>
                </div>
                <div class="stat-line">
                    <span>Zafer:</span>
                    <span class="stat-value" id="allahWinChance">50%</span>
                </div>
            </div>
            <div class="chat-box" id="allahChat"></div>
        </div>

        <!-- ORTA ALAN - SAVAŞ -->
        <div class="center-panel">
            <div class="top-bar">
                <div class="clock" id="clock">00:00:00</div>
                <div class="title">⚔️ SAVAŞ ALANINDA ⚔️</div>
                <div class="live-indicator">● CANLI YAYIN</div>
            </div>
            <canvas id="battlefieldCanvas"></canvas>
            <div class="battle-controls">
                <button class="control-btn" onclick="battle.togglePause()">⏸️ DURAKLAT</button>
                <button class="control-btn" onclick="battle.reset()">🔄 SIFIRLA</button>
            </div>
        </div>

        <!-- SAĞ PANEL - EMİR ORDUSU -->
        <div class="right-panel">
            <div class="panel-header">🔴 EMİR ORDUSU</div>
            <div class="team-stats">
                <div class="stat-line">
                    <span>Askerler:</span>
                    <span class="stat-value" id="emirCount">50</span>
                </div>
                <div class="stat-line">
                    <span>Güç:</span>
                    <span class="stat-value" id="emirPower">100%</span>
                </div>
                <div class="stat-line">
                    <span>Zafer:</span>
                    <span class="stat-value" id="emirWinChance">50%</span>
                </div>
            </div>
            <div class="chat-box" id="emirChat"></div>
        </div>
    </div>

    <div class="winner-overlay" id="winnerOverlay"></div>

    <script>
        const canvas = document.getElementById('battlefieldCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight - 80;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Saati güncelle
        setInterval(() => {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }, 1000);

        const battle = {
            allahSoldiers: 50,
            emirSoldiers: 50,
            allahMaxSoldiers: 50,
            emirMaxSoldiers: 50,
            paused: false,
            gameOver: false,
            time: 0,
            
            allahUnits: [],
            emirUnits: [],
            explosions: [],

            allahMesajlar: [
                "Allah askerleri: SALDIRRRR! 💪",
                "Allah: Kimse bize karşı koyamaz!",
                "Allah'ın ordusunun dışkısı bile savaş alanında!",
                "Allah: Emir nerede? Göremiyorum bile!",
                "Allah ask: 'Bu kadar kolay mı savaş?'",
                "Allah: Emir'in askerlerine 'gelmişsin mi sonunda?' 😂",
                "Allah ordusunun morali gökyüzünde!",
                "Allah: Dağları eziyorum, Emir'i mi söyleyelim?",
                "Allah askerleri: 'Bu bir savaş mı, oyun mu?'",
                "Allah: Emir'in askerleri miyav yapıyor sanki!",
                "Allah ordusunun biri: 'Hani savaş? Bunu katil çağırmalıyız!'",
                "Allah: Polis çağırsak Emir için 😂",
                "Allah'ın strategisi: ÖLDÜR ÖLDÜR ÖLDÜR!",
                "Allah: Emir'in ordusunun tamamı ölmüş, hala azalmıyor!",
                "Allah: 'Acı çeksin' dedi, ağlar gibi Emir!",
                "Allah ordusunun şarkısı: 'Geldik Gördük Yendik!'",
                "Allah: Emir kaç kere öldü, bir daha say!",
                "Allah'ın askeri: 'Hoca, bu adalet mi bilmiyorum!'",
                "Allah: Dağlar patladı, Emir durup ağlıyor!",
                "Allah: Emir gitme, bitmedi oyun! 🔥",
            ],

            emirMesajlar: [
                "Emir: Allah mısın sen? Vay pezevenk! 🔥",
                "Emir'in ordusu: KAHRETSIN NEREDE GIDERSEK GIDELIM!",
                "Emir: Allah'ın ordusuna 'uyuyor musunuz?' 😂",
                "Emir: Dağları ben patlatırım, Allah değil!",
                "Emir'in askeri: 'Allah'ın askerleri çöpmatik gibi!'",
                "Emir: 'Savaş mı? Soykırım demek lazım!' 🔥",
                "Emir ordusunun biri: 'Allahcıları gömdük de gömdük!'",
                "Emir: Allah'ı unuttur, ben senle uğraşmayacağım!",
                "Emir: Bomba yağdırıyorum, öl Allah istersen!",
                "Emir'in şarkısı: 'Allahı kurtaracak kimse yoktur!'",
                "Emir: Harita kırmızı oldu, kaçan kalmadı!",
                "Emir ordusunun mozu: 'Düşman kalmadı, eve dönebiliriz!'",
                "Emir: Allah artık ses çıkarmıyor bile!",
                "Emir'in askeri: 'Savaş bitti, zafer bizim! HAHAHAHA'",
                "Emir: Dağlar yanıyor, Allah'ın imamı dua etsin!",
                "Emir: Şimdi sen öl, ben seninle uğraşmam!",
                "Emir ordusunun biri: 'Allahcıları silmek istedim, bir de bak!'",
                "Emir: Allah'ın askerleri kaçıyorlar, söylesin!",
                "Emir: Bu savaş tarihte kara leke olacak, Allah için!",
                "Emir: Gittiler mi? Daha var, başka kim var? 🔥",
            ],

            nötrMesajlar: [
                "🎙️ Harita tamamen savaş bölgesine döndü!",
                "💣 BOOOOOM! Dağ patladı! Çamurda kan!",
                "🔥 Harita ateş saçması gibi parlıyor!",
                "💀 Bedenleri hava savurması gibi uçuyor!",
                "⚡ Şiddet dorukta! Dünya sarsılıyor!",
                "🌪️ Bomba saçması gibi mermi yağıyor!",
                "🔫 Silahlar PAM PAM PAM diyor kesintisiz!",
                "💥 Dağlar yok oldu, mayınlar patladı!",
                "🌍 Şiddetli çarpışmalar devam ediyor!",
                "⚔️ Korkunç bir dövüş meydanı bu!",
                "🎯 Vuruşlar etkili, yaralanmalar ağır!",
                "🚑 Paramediklerin işi var demek!",
                "🔞 Savaş en kanlı hali gösteriyor!",
                "💔 İçler acısı manzara!",
                "🕷️ Kan gölleri oluştu sahalarda!",
                "🌑 Gece gibi karanlık oldu gündüz!",
                "👻 Ölüler kalkıp savaşsa daha az olur!",
                "☠️ Kemik kırma sesleri yankılanıyor!",
                "🎪 Bu bir savaş değil, kıyım bu!",
                "📍 Yer işaretleme için cesetler yetmiyor!",
            ],

            init() {
                this.createUnits();
                this.gameLoop();
            },

            createUnits() {
                this.allahUnits = [];
                this.emirUnits = [];

                for (let i = 0; i < this.allahSoldiers; i++) {
                    this.allahUnits.push({
                        x: Math.random() * canvas.width * 0.25,
                        y: Math.random() * canvas.height,
                        vx: 2 + Math.random() * 2,
                        vy: (Math.random() - 0.5) * 2,
                        size: 5,
                        health: 100,
                        type: 'allah'
                    });
                }

                for (let i = 0; i < this.emirSoldiers; i++) {
                    this.emirUnits.push({
                        x: canvas.width * 0.75 + Math.random() * canvas.width * 0.25,
                        y: Math.random() * canvas.height,
                        vx: -2 - Math.random() * 2,
                        vy: (Math.random() - 0.5) * 2,
                        size: 5,
                        health: 100,
                        type: 'emir'
                    });
                }
            },

            update() {
                if (this.paused || this.gameOver) return;

                this.time++;

                // Askerler hareketsin
                this.allahUnits.forEach(unit => {
                    unit.x += unit.vx;
                    unit.y += unit.vy;
                    if (unit.y < 0 || unit.y > canvas.height) unit.vy *= -1;
                    unit.y = Math.max(0, Math.min(canvas.height, unit.y));
                });

                this.emirUnits.forEach(unit => {
                    unit.x += unit.vx;
                    unit.y += unit.vy;
                    if (unit.y < 0 || unit.y > canvas.height) unit.vy *= -1;
                    unit.y = Math.max(0, Math.min(canvas.height, unit.y));
                });

                // Çatışmalar
                for (let i = 0; i < this.allahUnits.length; i++) {
                    for (let j = 0; j < this.emirUnits.length; j++) {
                        const dx = this.allahUnits[i].x - this.emirUnits[j].x;
                        const dy = this.allahUnits[i].y - this.emirUnits[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 50) {
                            if (Math.random() > 0.5) {
                                this.emirUnits[j].health -= 20;
                                this.playSound('hit');
                            } else {
                                this.allahUnits[i].health -= 20;
                                this.playSound('hit');
                            }
                        }
                    }
                }

                // Ölü askerleri temizle
                this.allahUnits = this.allahUnits.filter(u => {
                    if (u.health <= 0) {
                        this.createExplosion(u.x, u.y);
                        return false;
                    }
                    return true;
                });

                this.emirUnits = this.emirUnits.filter(u => {
                    if (u.health <= 0) {
                        this.createExplosion(u.x, u.y);
                        return false;
                    }
                    return true;
                });

                // Random bombalar
                if (this.time % 12 === 0 && Math.random() > 0.3) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    this.createExplosion(x, y);
                    this.playSound('bomb');

                    // Etraf askerler hasar alsın
                    this.allahUnits.forEach(u => {
                        const dx = u.x - x;
                        const dy = u.y - y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) u.health -= 30;
                    });

                    this.emirUnits.forEach(u => {
                        const dx = u.x - x;
                        const dy = u.y - y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) u.health -= 30;
                    });
                }

                // Explosions update
                this.explosions = this.explosions.filter(e => e.life > 0);
                this.explosions.forEach(e => {
                    e.radius += 5;
                    e.life -= 0.035;
                });

                // Random savaş mesajları (her iki taraf konuşsun)
                if (this.time % 45 === 0) {
                    const allahKonuşma = this.allahMesajlar[Math.floor(Math.random() * this.allahMesajlar.length)];
                    const emirKonuşma = this.emirMesajlar[Math.floor(Math.random() * this.emirMesajlar.length)];
                    const nötrKonuşma = this.nötrMesajlar[Math.floor(Math.random() * this.nötrMesajlar.length)];

                    // Kim öndeyse daha çok konuşsun
                    const random = Math.random();
                    
                    if (this.allahUnits.length > this.emirUnits.length) {
                        if (random < 0.6) {
                            this.addMessage('allah', allahKonuşma);
                        } else if (random < 0.85) {
                            this.addMessage('emir', emirKonuşma);
                        } else {
                            this.addMessage('neutral', nötrKonuşma);
                        }
                    } else if (this.emirUnits.length > this.allahUnits.length) {
                        if (random < 0.6) {
                            this.addMessage('emir', emirKonuşma);
                        } else if (random < 0.85) {
                            this.addMessage('allah', allahKonuşma);
                        } else {
                            this.addMessage('neutral', nötrKonuşma);
                        }
                    } else {
                        const choice = random < 0.33 ? 'allah' : random < 0.66 ? 'emir' : 'neutral';
                        if (choice === 'allah') this.addMessage('allah', allahKonuşma);
                        else if (choice === 'emir') this.addMessage('emir', emirKonuşma);
                        else this.addMessage('neutral', nötrKonuşma);
                    }
                }

                // Oyun sonu kontrol
                if (this.allahUnits.length === 0 && this.emirUnits.length === 0) {
                    this.endGame("⚖️ BERABERE!\nHER İKİ ORDU DA YÖK OLDU! ⚖️");
                } else if (this.allahUnits.length === 0) {
                    this.endGame("🔴 EMİR KAZANDI!\n\nALLAH ORDUSUNUN\nTÜM ASKERLERİ YALDI! 🔴\n\nTARİH YAZILDI!");
                } else if (this.emirUnits.length === 0) {
                    this.endGame("🔵 ALLAH KAZANDI!\n\nEMİR ORDUSUNUN\nTÜM ASKERLERİ YALDI! 🔵\n\nTARİH YAZILDI!");
                }

                this.updateStats();
            },

            createExplosion(x, y) {
                this.explosions.push({
                    x: x,
                    y: y,
                    radius: 0,
                    life: 1,
                    maxRadius: 200
                });
            },

            addMessage(type, text) {
                const now = new Date();
                const time = String(now.getHours()).padStart(2, '0') + ':' + 
                            String(now.getMinutes()).padStart(2, '0') + ':' +
                            String(now.getSeconds()).padStart(2, '0');

                const msg = document.createElement('div');
                msg.className = `chat-message ${type}-message`;
                msg.innerHTML = `<div class="message-time">[${time}]</div>${text}`;

                if (type === 'allah') {
                    document.getElementById('allahChat').appendChild(msg);
                    if (document.getElementById('allahChat').children.length > 25) {
                        document.getElementById('allahChat').removeChild(
                            document.getElementById('allahChat').firstChild
                        );
                    }
                    document.getElementById('allahChat').scrollTop = document.getElementById('allahChat').scrollHeight;
                } else if (type === 'emir') {
                    document.getElementById('emirChat').appendChild(msg);
                    if (document.getElementById('emirChat').children.length > 25) {
                        document.getElementById('emirChat').removeChild(
                            document.getElementById('emirChat').firstChild
                        );
                    }
                    document.getElementById('emirChat').scrollTop = document.getElementById('emirChat').scrollHeight;
                } else {
                    // Nötr mesajlar ikiye bölün
                    document.getElementById('allahChat').appendChild(msg.cloneNode(true));
                    if (document.getElementById('allahChat').children.length > 25) {
                        document.getElementById('allahChat').removeChild(
                            document.getElementById('allahChat').firstChild
                        );
                    }
                    
                    document.getElementById('emirChat').appendChild(msg);
                    if (document.getElementById('emirChat').children.length > 25) {
                        document.getElementById('emirChat').removeChild(
                            document.getElementById('emirChat').firstChild
                        );
                    }
                    document.getElementById('emirChat').scrollTop = document.getElementById('emirChat').scrollHeight;
                }
            },

            endGame(message) {
                this.gameOver = true;
                const winner = document.getElementById('winnerOverlay');
                winner.textContent = message;
                winner.style.display = 'block';
                this.playSound('victory');
            },

            playSound(type) {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    if (type === 'hit') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = 280 + Math.random() * 150;
                        gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.05);
                    } else if (type === 'bomb') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(400, audioContext.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(80, audioContext.currentTime + 0.7);
                        gain.gain.setValueAtTime(0.4, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.7);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.7);
                    } else if (type === 'victory') {
                        for (let i = 0; i < 6; i++) {
                            setTimeout(() => {
                                const o = audioContext.createOscillator();
                                const g = audioContext.createGain();
                                o.connect(g);
                                g.connect(audioContext.destination);
                                o.frequency.value = 800 + i * 150;
                                g.gain.setValueAtTime(0.25, audioContext.currentTime);
                                g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                                o.start();
                                o.stop(audioContext.currentTime + 0.3);
                            }, i * 150);
                        }
                    }
                } catch (e) {}
            },

            updateStats() {
                document.getElementById('allahCount').textContent = this.allahUnits.length;
                document.getElementById('emirCount').textContent = this.emirUnits.length;
                
                const allahHealth = Math.round((this.allahUnits.length / this.allahMaxSoldiers) * 100);
                const emirHealth = Math.round((this.emirUnits.length / this.emirMaxSoldiers) * 100);
                
                document.getElementById('allahPower').textContent = allahHealth + '%';
                document.getElementById('emirPower').textContent = emirHealth + '%';

                const total = this.allahUnits.length + this.emirUnits.length;
                if (total > 0) {
                    const allahProb = Math.round((this.allahUnits.length / total) * 100);
                    const emirProb = 100 - allahProb;
                    document.getElementById('allahWinChance').textContent = allahProb + '%';
                    document.getElementById('emirWinChance').textContent = emirProb + '%';
                }

                // Panelleri highlight et
                const centerPanel = document.querySelector('.center-panel');
                centerPanel.classList.remove('allah-leading', 'emir-leading');
                
                if (this.allahUnits.length > this.emirUnits.length + 3) {
                    centerPanel.classList.add('allah-leading');
                } else if (this.emirUnits.length > this.allahUnits.length + 3) {
                    centerPanel.classList.add('emir-leading');
                }
            },

            draw() {
                // Harita arkaplan
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#1a3a4a');
                gradient.addColorStop(0.5, '#0f1a25');
                gradient.addColorStop(1, '#1a3a4a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Dağ çizimleri (arka plan)
                ctx.fillStyle = 'rgba(80, 100, 120, 0.1)';
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo((i * canvas.width / 5) - 50, canvas.height);
                    ctx.lineTo((i * canvas.width / 5) + 100, canvas.height * 0.5);
                    ctx.lineTo((i * canvas.width / 5) + 200, canvas.height);
                    ctx.fill();
                }

                // Orta çizgi
                ctx.strokeStyle = 'rgba(0, 255, 136, 0.25)';
                ctx.lineWidth = 5;
                ctx.setLineDash([40, 25]);
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);

                // Allah askerlerini çiz
                ctx.fillStyle = '#00d4ff';
                ctx.shadowColor = 'rgba(0, 212, 255, 0.9)';
                ctx.shadowBlur = 12;
                this.allahUnits.forEach(unit => {
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, unit.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowColor = 'transparent';

                // Emir askerlerini çiz
                ctx.fillStyle = '#ff1744';
                ctx.shadowColor = 'rgba(255, 23, 68, 0.9)';
                ctx.shadowBlur = 12;
                this.emirUnits.forEach(unit => {
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, unit.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowColor = 'transparent';

                // Explosions (çok güzel)
                this.explosions.forEach(e => {
                    const gradient = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
                    gradient.addColorStop(0, `rgba(255, 220, 0, ${e.life * 0.7})`);
                    gradient.addColorStop(0.4, `rgba(255, 150, 0, ${e.life * 0.4})`);
                    gradient.addColorStop(1, `rgba(255, 23, 68, 0)`);
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // İç çevre
                    ctx.strokeStyle = `rgba(255, 220, 0, ${e.life * 0.8})`;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                });

                // Efsaneler
                ctx.font = 'bold 22px Arial';
                ctx.fillStyle = '#00d4ff';
                ctx.textAlign = 'left';
                ctx.fillText('🔵 ALLAH', 30, canvas.height - 20);

                ctx.fillStyle = '#ff1744';
                ctx.textAlign = 'right';
                ctx.fillText('EMİR 🔴', canvas.width - 30, canvas.height - 20);

                // Ortada skoru
                ctx.font = 'bold 64px Arial';
                ctx.fillStyle = '#d4af37';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(212, 175, 55, 0.6)';
                ctx.shadowBlur = 25;
                ctx.fillText(`${this.allahUnits.length} ⚔ ${this.emirUnits.length}`, canvas.width / 2, canvas.height / 2 + 15);
                ctx.shadowColor = 'transparent';
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            },

            togglePause() {
                this.paused = !this.paused;
            },

            reset() {
                this.allahSoldiers = 50;
                this.emirSoldiers = 50;
                this.paused = false;
                this.gameOver = false;
                this.time = 0;
                this.createUnits();
                document.getElementById('winnerOverlay').style.display = 'none';
                document.getElementById('allahChat').innerHTML = '';
                document.getElementById('emirChat').innerHTML = '';
                this.updateStats();
            }
        };

        battle.init();
    </script>
</body>
</html>
