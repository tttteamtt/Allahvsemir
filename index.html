<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allah vs Emir - Stratejik Savaş</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 1000px;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid #1a2333;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 2.8em;
            font-weight: 900;
            letter-spacing: 3px;
            color: #c0a080;
            text-shadow: 0 2px 10px rgba(192, 160, 128, 0.3);
        }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #1a2333 0%, #0f1419 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a3a4a;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            border-color: #3a5a7a;
            box-shadow: 0 5px 20px rgba(58, 90, 122, 0.2);
        }

        .stat-box h3 {
            color: #a0a8b8;
            font-size: 0.85em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 3.5em;
            font-weight: 900;
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }

        .stat-box.allah .stat-value {
            color: #7fa3c0;
        }

        .stat-box.emir .stat-value {
            color: #c07a7a;
        }

        .stat-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 0.85em;
        }

        .percentage {
            color: #d4af37;
            font-weight: bold;
        }

        .status-message {
            color: #7aa080;
            font-weight: 600;
            margin-top: 5px;
            min-height: 18px;
        }

        .game-area {
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1419 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid #1a2333;
            position: relative;
            min-height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #0a0e1a 0%, #0f1419 100%);
            border-radius: 8px;
            cursor: crosshair;
            max-width: 100%;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .controls-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #2a3a4a 0%, #1a2333 100%);
            border: 1px solid #3a5a7a;
            color: #b0c8e0;
            padding: 12px 18px;
            font-size: 0.95em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: linear-gradient(135deg, #3a5a7a 0%, #2a3a4a 100%);
            border-color: #5a8aaa;
            box-shadow: 0 5px 15px rgba(90, 138, 170, 0.2);
            color: #d0e8f0;
        }

        button:active {
            transform: scale(0.98);
        }

        .info-section {
            background: linear-gradient(135deg, #1a2333 0%, #0f1419 100%);
            border-radius: 12px;
            padding: 18px;
            border: 1px solid #2a3a4a;
            border-left: 3px solid #7aa080;
        }

        .info-section h3 {
            color: #a0a8b8;
            margin-bottom: 12px;
            font-size: 1.1em;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .dynamic-text {
            font-size: 1.15em;
            color: #d4af37;
            font-weight: 600;
            line-height: 1.8;
            min-height: 55px;
            padding: 10px;
            background: rgba(10, 14, 26, 0.5);
            border-left: 3px solid #7aa080;
            border-radius: 5px;
            animation: textChange 0.8s ease-in-out;
        }

        @keyframes textChange {
            0% { opacity: 0; transform: translateX(-10px); }
            50% { opacity: 1; }
            100% { opacity: 1; transform: translateX(0); }
        }

        .stats-display {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .stat-item {
            background: rgba(26, 35, 51, 0.7);
            border: 1px solid #2a3a4a;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.9em;
            color: #a0a8b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-item .value {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.1em;
        }

        .score-history {
            margin-top: 15px;
            max-height: 180px;
            overflow-y: auto;
            background: rgba(10, 14, 26, 0.5);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #1a2333;
        }

        .score-entry {
            padding: 8px 10px;
            margin: 5px 0;
            background: rgba(26, 35, 51, 0.6);
            border-left: 3px solid #7aa080;
            border-radius: 4px;
            font-size: 0.9em;
            color: #a0a8b8;
            display: flex;
            justify-content: space-between;
        }

        .score-entry .action {
            color: #d4af37;
            font-weight: 600;
        }

        .score-entry .time {
            color: #7aa080;
            font-size: 0.85em;
        }

        .combo-display {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #2a3a4a 0%, #1a2333 100%);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 700;
            border: 1px solid #3a5a7a;
            z-index: 1000;
            display: none;
            color: #d4af37;
        }

        .combo-display.active {
            display: block;
            animation: comboShow 0.3s ease;
        }

        @keyframes comboShow {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0e1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a5a7a;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            h1 { font-size: 2em; }
            .stat-value { font-size: 2.5em; }
            .game-area { min-height: 350px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ ALLAH vs EMİR ⚔️</h1>

        <div class="stats-container">
            <div class="stat-box allah">
                <h3>🔵 Allah</h3>
                <div class="stat-value" id="allahScore">0</div>
                <div class="stat-info">
                    <span>Başarı:</span>
                    <span class="percentage" id="allahPercent">0%</span>
                </div>
                <div class="status-message" id="allahStatus">Hazırlanıyor...</div>
            </div>

            <div class="stat-box emir">
                <h3>🔴 Emir</h3>
                <div class="stat-value" id="emirScore">0</div>
                <div class="stat-info">
                    <span>Başarı:</span>
                    <span class="percentage" id="emirPercent">0%</span>
                </div>
                <div class="status-message" id="emirStatus">Hazırlanıyor...</div>
            </div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="900" height="450"></canvas>
        </div>

        <div class="controls-container">
            <button onclick="game.clickAllah()">🔵 ALLAH</button>
            <button onclick="game.clickEmir()">🔴 EMİR</button>
            <button onclick="game.bombAttack()">💣 BOMBA</button>
            <button onclick="game.superPower()">⚡ GÜÇLENDIR</button>
            <button onclick="game.reset()">🔄 SIFIRLA</button>
            <button onclick="game.toggleSound()">🔊 SES</button>
        </div>

        <div class="info-section">
            <h3>📊 Durum</h3>
            <div class="dynamic-text" id="dynamicText">Oyun başlatılıyor...</div>
            
            <div class="stats-display">
                <div class="stat-item">
                    <span>Toplam Hamleler:</span>
                    <span class="value" id="totalMoves">0</span>
                </div>
                <div class="stat-item">
                    <span>Combo Rekoru:</span>
                    <span class="value" id="maxCombo">0</span>
                </div>
                <div class="stat-item">
                    <span>Fark (Oran):</span>
                    <span class="value" id="scoreGap">0</span>
                </div>
                <div class="stat-item">
                    <span>Oyun Durumu:</span>
                    <span class="value" id="gameStatus">Hazır</span>
                </div>
            </div>

            <h3 style="margin-top: 18px; color: #a0a8b8;">📜 Hamle Geçmişi</h3>
            <div class="score-history" id="scoreHistory"></div>
        </div>
    </div>

    <div class="combo-display" id="comboDisplay">
        🔥 COMBO x<span id="comboValue">0</span>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            canvas.width = Math.min(rect.width - 30, 900);
            canvas.height = Math.min(canvas.width * 0.5, 450);
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const game = {
            allahScore: 0,
            emirScore: 0,
            combo: 0,
            maxCombo: 0,
            lastClickTime: 0,
            soundEnabled: true,
            particles: [],
            explosions: [],
            history: [],
            totalMoves: 0,

            messages: [
                "Allah stratejisini uyguluyor...",
                "Emir karşı saldırısı başlatıyor...",
                "Harita dramatik şekilde değişiyor!",
                "Büyük hamle gerçekleştirildi!",
                "Zıt dönüş mümkün görünüyor!",
                "Oyun sonucu belirsiz kalıyor...",
                "Hızlı bir hamle yapıldı!",
                "Stratejik zafer yaklaşıyor!",
                "İnanılmaz bir dönüş!",
                "Güçler dengeleniyor...",
                "Fırsat penceresi açıldı!",
                "Cesur bir hareket!",
                "Savaşın akışı değişiyor!",
                "Tahmin edilemeyen bir oyun!",
                "Nihai hamle zamanı geldi!",
                "İçişler karışıyor...",
                "Zaferin sinyalleri veriliyor...",
                "Stratejik bir hata yapılabilir!",
                "Dönüş noktası yaklaşıyor!",
                "Oyunun kaderini belirleyen an!"
            ],

            colors: {
                allah: ['#7fa3c0', '#6a8cb5', '#5a7ca0'],
                emir: ['#c07a7a', '#b56a6a', '#a85a5a'],
                particles: ['#a0a8b8', '#7aa080', '#d4af37']
            },

            updateScores() {
                document.getElementById('allahScore').textContent = this.allahScore;
                document.getElementById('emirScore').textContent = this.emirScore;
                document.getElementById('totalMoves').textContent = this.totalMoves;
                document.getElementById('maxCombo').textContent = this.maxCombo;

                const total = this.allahScore + this.emirScore;
                if (total > 0) {
                    const allahPercent = Math.round((this.allahScore / total) * 100);
                    const emirPercent = 100 - allahPercent;
                    document.getElementById('allahPercent').textContent = allahPercent + '%';
                    document.getElementById('emirPercent').textContent = emirPercent + '%';
                    
                    const gap = Math.abs(this.allahScore - this.emirScore);
                    document.getElementById('scoreGap').textContent = gap;
                    
                    if (allahPercent >= emirPercent + 15) {
                        document.getElementById('allahStatus').textContent = '✓ Önde!';
                        document.getElementById('emirStatus').textContent = '✗ Geri';
                        document.getElementById('gameStatus').textContent = 'Allah Kazanıyor';
                    } else if (emirPercent >= allahPercent + 15) {
                        document.getElementById('emirStatus').textContent = '✓ Önde!';
                        document.getElementById('allahStatus').textContent = '✗ Geri';
                        document.getElementById('gameStatus').textContent = 'Emir Kazanıyor';
                    } else {
                        document.getElementById('allahStatus').textContent = '⚖ Denli';
                        document.getElementById('emirStatus').textContent = '⚖ Denli';
                        document.getElementById('gameStatus').textContent = 'Çok Yakın';
                    }
                }
            },

            clickAllah() {
                this.allahScore += 1;
                this.totalMoves++;
                this.addCombo();
                this.createParticles(canvas.width / 4, canvas.height / 2, this.colors.allah);
                this.playSound('click1');
                this.updateDynamicText();
                this.updateScores();
                this.recordHistory('Allah +1');
            },

            clickEmir() {
                this.emirScore += 1;
                this.totalMoves++;
                this.addCombo();
                this.createParticles(canvas.width * 3 / 4, canvas.height / 2, this.colors.emir);
                this.playSound('click2');
                this.updateDynamicText();
                this.updateScores();
                this.recordHistory('Emir +1');
            },

            bombAttack() {
                const damage = Math.floor(Math.random() * 5) + 8;
                if (Math.random() > 0.5) {
                    this.allahScore += damage;
                    this.recordHistory(`💣 Allah Bomba! +${damage}`);
                } else {
                    this.emirScore += damage;
                    this.recordHistory(`💣 Emir Bomba! +${damage}`);
                }
                this.totalMoves++;
                this.playSound('bomb');
                this.createExplosion(canvas.width / 2, canvas.height / 2);
                this.updateScores();
            },

            superPower() {
                const bonus = Math.floor(Math.random() * 8) + 15;
                if (Math.random() > 0.5) {
                    this.allahScore += bonus;
                    this.recordHistory(`⚡ Allah Güçlendir! +${bonus}`);
                } else {
                    this.emirScore += bonus;
                    this.recordHistory(`⚡ Emir Güçlendir! +${bonus}`);
                }
                this.totalMoves++;
                this.playSound('power');
                this.createExplosion(canvas.width / 2, canvas.height / 2);
                this.updateScores();
            },

            addCombo() {
                const now = Date.now();
                if (now - this.lastClickTime < 600) {
                    this.combo++;
                } else {
                    this.combo = 1;
                }
                this.lastClickTime = now;

                if (this.combo > this.maxCombo) {
                    this.maxCombo = this.combo;
                }

                if (this.combo > 1) {
                    const display = document.getElementById('comboDisplay');
                    display.classList.add('active');
                    document.getElementById('comboValue').textContent = this.combo;
                    
                    if (this.combo % 5 === 0) {
                        this.playSound('combo');
                    }
                }
            },

            createParticles(x, y, colors) {
                for (let i = 0; i < 12; i++) {
                    const angle = (Math.PI * 2 * i) / 12;
                    const speed = 2 + Math.random() * 4;
                    this.particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        size: 2 + Math.random() * 4
                    });
                }
            },

            createExplosion(x, y) {
                this.explosions.push({ x, y, radius: 0, maxRadius: 180, life: 1, color: this.colors.particles });
                for (let i = 0; i < 50; i++) {
                    const angle = Math.PI * 2 * Math.random();
                    const speed = 2 + Math.random() * 5;
                    this.particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        color: this.colors.particles[Math.floor(Math.random() * this.colors.particles.length)],
                        size: 3 + Math.random() * 7
                    });
                }
            },

            playSound(type) {
                if (!this.soundEnabled) return;
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    if (type === 'click1') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = 450;
                        gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.08);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.08);
                    } else if (type === 'click2') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = 350;
                        gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.08);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.08);
                    } else if (type === 'bomb') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(150, audioContext.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(40, audioContext.currentTime + 0.4);
                        gain.gain.setValueAtTime(0.4, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.4);
                    } else if (type === 'power') {
                        for (let i = 0; i < 4; i++) {
                            setTimeout(() => {
                                const o = audioContext.createOscillator();
                                const g = audioContext.createGain();
                                o.connect(g);
                                g.connect(audioContext.destination);
                                o.frequency.value = 700 + i * 150;
                                g.gain.setValueAtTime(0.15, audioContext.currentTime);
                                g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.12);
                                o.start();
                                o.stop(audioContext.currentTime + 0.12);
                            }, i * 60);
                        }
                    } else if (type === 'combo') {
                        const o = audioContext.createOscillator();
                        const g = audioContext.createGain();
                        o.connect(g);
                        g.connect(audioContext.destination);
                        o.frequency.value = 900;
                        g.gain.setValueAtTime(0.2, audioContext.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                        o.start();
                        o.stop(audioContext.currentTime + 0.15);
                    }
                } catch (e) {}
            },

            updateDynamicText() {
                const msg = this.messages[Math.floor(Math.random() * this.messages.length)];
                document.getElementById('dynamicText').textContent = msg;
            },

            recordHistory(action) {
                const time = new Date();
                const timeStr = time.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                this.history.unshift({ action, time: timeStr });
                if (this.history.length > 25) this.history.pop();
                this.updateHistoryDisplay();
            },

            updateHistoryDisplay() {
                const div = document.getElementById('scoreHistory');
                div.innerHTML = this.history.map(e => 
                    `<div class="score-entry"><span class="action">${e.action}</span><span class="time">${e.time}</span></div>`
                ).join('');
            },

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                alert(this.soundEnabled ? '🔊 Ses AÇIK' : '🔇 Ses KAPALI');
            },

            reset() {
                this.allahScore = 0;
                this.emirScore = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.totalMoves = 0;
                this.particles = [];
                this.explosions = [];
                this.history = [];
                this.updateScores();
                this.updateHistoryDisplay();
                document.getElementById('dynamicText').textContent = 'Oyun sıfırlandı. Yeni mücadele başlıyor...';
                document.getElementById('comboDisplay').classList.remove('active');
            },

            update() {
                this.particles = this.particles.filter(p => p.life > 0);
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.life -= 0.018;
                });
                this.explosions = this.explosions.filter(e => e.life > 0);
                this.explosions.forEach(e => {
                    e.radius = e.maxRadius * (1 - e.life);
                    e.life -= 0.015;
                });
            },

            draw() {
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#0a0e1a');
                gradient.addColorStop(0.5, '#0f1419');
                gradient.addColorStop(1, '#0a0e1a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Center line
                ctx.strokeStyle = 'rgba(122, 160, 128, 0.1)';
                ctx.lineWidth = 2;
                ctx.setLineDash([15, 10]);
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);

                // Team areas
                ctx.fillStyle = 'rgba(127, 163, 192, 0.03)';
                ctx.fillRect(0, 0, canvas.width / 2, canvas.height);
                ctx.fillStyle = 'rgba(192, 122, 122, 0.03)';
                ctx.fillRect(canvas.width / 2, 0, canvas.width / 2, canvas.height);

                // Labels
                ctx.font = 'bold 28px Arial';
                ctx.fillStyle = '#7fa3c0';
                ctx.textAlign = 'center';
                ctx.fillText('🔵 ALLAH', canvas.width / 4, 45);
                ctx.fillStyle = '#c07a7a';
                ctx.fillText('🔴 EMİR', canvas.width * 3 / 4, 45);

                // Probability display
                const total = this.allahScore + this.emirScore;
                if (total > 0) {
                    const allahProb = Math.round((this.allahScore / total) * 100);
                    const emirProb = 100 - allahProb;
                    
                    ctx.font = 'bold 20px Arial';
                    ctx.fillStyle = '#d4af37';
                    ctx.fillText(`${allahProb}% - ${emirProb}%`, canvas.width / 2, canvas.height - 30);
                    
                    ctx.font = '14px Arial';
                    ctx.fillStyle = '#a0a8b8';
                    ctx.fillText(`Toplam: ${total} | Fark: ${Math.abs(this.allahScore - this.emirScore)}`, canvas.width / 2, canvas.height - 10);
                }

                // Explosions
                this.explosions.forEach(e => {
                    const color = e.color[Math.floor(Math.random() * e.color.length)];
                    ctx.fillStyle = color;
                    ctx.globalAlpha = e.life * 0.4;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                });

                // Particles
                this.particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life * 0.8;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                });

                // Main score
                ctx.font = 'bold 48px Arial';
                ctx.fillStyle = '#d4af37';
                ctx.textAlign = 'center';
                ctx.globalAlpha = 1;
                ctx.fillText(`${this.allahScore} ⚔ ${this.emirScore}`, canvas.width / 2, canvas.height / 2 + 20);
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.gameLoop();
        game.updateScores();
        game.updateDynamicText();

        document.addEventListener('keydown', (e) => {
            if (e.key === '1') game.clickAllah();
            if (e.key === '2') game.clickEmir();
            if (e.key === '3') game.bombAttack();
            if (e.key === '4') game.superPower();
            if (e.key === '0') game.reset();
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if (x < canvas.width / 2) game.clickAllah();
            else game.clickEmir();
        });

        window.addEventListener('load', resizeCanvas);
    </script>
</body>
</html>
