<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allah vs Emir - Canlı Savaş Yayını</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 10px;
            padding: 10px;
        }

        /* SOL PANEL - ALLAH TAKIMI */
        .left-panel {
            background: linear-gradient(135deg, rgba(0, 50, 100, 0.9) 0%, rgba(15, 30, 50, 0.95) 100%);
            border: 2px solid #00d4ff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            overflow: hidden;
        }

        /* SAĞ PANEL - EMİR TAKIMI */
        .right-panel {
            background: linear-gradient(135deg, rgba(100, 20, 20, 0.9) 0%, rgba(50, 15, 15, 0.95) 100%);
            border: 2px solid #ff1744;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(255, 23, 68, 0.3);
            overflow: hidden;
        }

        .panel-header {
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid currentColor;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 0 0 10px currentColor;
        }

        .left-panel .panel-header {
            color: #00d4ff;
        }

        .right-panel .panel-header {
            color: #ff1744;
        }

        .team-stats {
            padding: 15px;
            border-bottom: 2px solid currentColor;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }

        .left-panel .stat-line {
            color: #00d4ff;
        }

        .right-panel .stat-line {
            color: #ff1744;
        }

        .stat-value {
            font-weight: bold;
            font-size: 18px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column-reverse;
        }

        .chat-message {
            padding: 8px 10px;
            margin: 5px 0;
            border-radius: 6px;
            border-left: 3px solid;
            font-size: 13px;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message-time {
            font-size: 11px;
            opacity: 0.8;
            margin-bottom: 3px;
        }

        .allah-message {
            background: rgba(0, 212, 255, 0.15);
            border-left-color: #00d4ff;
            color: #00d4ff;
        }

        .emir-message {
            background: rgba(255, 23, 68, 0.15);
            border-left-color: #ff1744;
            color: #ff1744;
        }

        .neutral-message {
            background: rgba(0, 255, 136, 0.1);
            border-left-color: #00ff88;
            color: #00ff88;
        }

        /* ORTA ALAN */
        .center-panel {
            background: linear-gradient(135deg, #1a2840 0%, #0f1520 100%);
            border: 2px solid #00ff88;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 2px solid #00ff88;
            background: rgba(10, 14, 27, 0.7);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff1744;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }

        .clock {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
            font-family: 'Courier New', monospace;
        }

        .title {
            flex: 1;
            text-align: center;
            color: #d4af37;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #battlefieldCanvas {
            flex: 1;
            display: block;
        }

        .battle-controls {
            padding: 10px;
            border-top: 2px solid #00ff88;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .control-btn {
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            border: none;
            color: #0a0e27;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.6);
        }

        .winner-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.99) 0%, rgba(26, 31, 46, 0.99) 100%);
            border: 3px solid #d4af37;
            padding: 50px 80px;
            border-radius: 20px;
            z-index: 200;
            color: #d4af37;
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            display: none;
            animation: winnerShow 0.8s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(212, 175, 55, 0.4);
            backdrop-filter: blur(10px);
        }

        @keyframes winnerShow {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 3px;
        }

        .allah-leading {
            border-color: #00d4ff !important;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5) !important;
        }

        .emir-leading {
            border-color: #ff1744 !important;
            box-shadow: 0 0 30px rgba(255, 23, 68, 0.5) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SOL PANEL - ALLAH ORDUSU -->
        <div class="left-panel">
            <div class="panel-header">🔵 ALLAH ORDUSU</div>
            <div class="team-stats">
                <div class="stat-line">
                    <span>Askerler:</span>
                    <span class="stat-value" id="allahCount">50</span>
                </div>
                <div class="stat-line">
                    <span>Güç:</span>
                    <span class="stat-value" id="allahPower">100%</span>
                </div>
                <div class="stat-line">
                    <span>Zafer:</span>
                    <span class="stat-value" id="allahWinChance">50%</span>
                </div>
            </div>
            <div class="chat-box" id="allahChat"></div>
        </div>

        <!-- ORTA ALAN - SAVAŞ -->
        <div class="center-panel">
            <div class="top-bar">
                <div class="clock" id="clock">00:00:00</div>
                <div class="title">⚔️ SAVAŞ ALANINDA ⚔️</div>
                <div class="live-indicator">● CANLI YAYIN</div>
            </div>
            <canvas id="battlefieldCanvas"></canvas>
            <div class="battle-controls">
                <button class="control-btn" onclick="battle.togglePause()">⏸️ DURAKLAT</button>
                <button class="control-btn" onclick="battle.reset()">🔄 SIFIRLA</button>
            </div>
        </div>

        <!-- SAĞ PANEL - EMİR ORDUSU -->
        <div class="right-panel">
            <div class="panel-header">🔴 EMİR ORDUSU</div>
            <div class="team-stats">
                <div class="stat-line">
                    <span>Askerler:</span>
                    <span class="stat-value" id="emirCount">50</span>
                </div>
                <div class="stat-line">
                    <span>Güç:</span>
                    <span class="stat-value" id="emirPower">100%</span>
                </div>
                <div class="stat-line">
                    <span>Zafer:</span>
                    <span class="stat-value" id="emirWinChance">50%</span>
                </div>
            </div>
            <div class="chat-box" id="emirChat"></div>
        </div>
    </div>

    <div class="winner-overlay" id="winnerOverlay"></div>

    <script>
        const canvas = document.getElementById('battlefieldCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight - 80;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Saati güncelle
        setInterval(() => {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }, 1000);

        const battle = {
            allahSoldiers: 50,
            emirSoldiers: 50,
            allahMaxSoldiers: 50,
            emirMaxSoldiers: 50,
            paused: false,
            gameOver: false,
            time: 0,
            
            allahUnits: [],
            emirUnits: [],
            explosions: [],

            komikMesajlar: [
                // ALLAH POZİTİF
                "Allah ordusunun morali ÇÖP GIBI!",
                "Allah: Ben kimim? 💪",
                "Allah askerleri uçuyor sanki!",
                "Allah yok etme modu açtı!",
                "Allah'ın askerleri robot gibi çalışıyor!",
                "Allah: Bu kadar kolay mı? 😎",
                "Allah Übermensch modunda!",
                "Allah harita çizmeye başladı!",
                "Allah'ın taktiği: SALDIRRRR!",
                "Allah'ın askerler: 'SİZ KİMSİNİZ?'",
                "Allah ruh halinde! Harita açılmış!",
                "Allah 1v50 yapıyor amk!",
                
                // EMİR POZİTİF
                "Emir ord zamanı geldi! ⚔️",
                "Emir: Bitti mi? 🔥",
                "Emir askerleri TARİHTE YER ALIYOR!",
                "Emir: Sanki oyun oynuyorum!",
                "Emir saldırısı ARMAGEDDÖN!",
                "Emir istila modu: AKTIF ✓",
                "Emir askerleri FANTASİ GİBİ!",
                "Emir: Ben kim? Tanrı mı? 👑",
                "Emir ordusunun kuvveti SONSUZ!",
                "Emir: Allah nerede? 👀",
                "Emir haritayı boşalttı!",
                "Emir 50v1 yapıyor amk!",
                
                // KOMIK NÖTR
                "Bomba patlama: *BOOOOOM* 💣",
                "Dağlar yok oldu AMKKK!",
                "Harita yangın içinde!",
                "Orman: Lütfen bana merhamet!",
                "Silahlar: PAMMMM PAM PAM!",
                "Gökyüzü kızıl oldu!",
                "Çamurda kan karışıyor!",
                "Bu savaş TARİH YAZACAK!",
                "Mayınlar patladı! BÖÖÖÖÖM!",
                "Tüm harita ses duymayı unuttu!",
                "Bomba saçması: *fışıkk fışıkk*",
                "Silahlar ısındı mı? 🔥",
                "Mermi yağmuru başladı!",
                "Ateş saçması VAV!",
                "Dağlar cıvata oyununu oynamıyor!",
                
                // ALLAH YOK OLMA
                "ALLAH NEREDEYSE YOK! 😱",
                "Allah nefes almakta zorluk çekiyor!",
                "Allah: İt.. İtfaiye çağırın!",
                "Allah yorgun gibi görünüyor!",
                "Allah son darbede!",
                "Allah savaş meydanından çekiliyor!",
                "Allah: Bu haksızlık!",
                "Allah güçü kaybediyor!",
                "ALLAH YALVARIYOR! 'AMAN!!'",
                "Allah sesiniz kısılıyor! 📉",
                "Allah hata mı yaptı? 😱",
                "ALLAH DÜŞÜyor... DÜŞÜYOR...",
                "Allah son kurşununu attı!",
                "Allah düşük tanktan beri!",
                "Allah: Bitti mi artık? 😭",
                "Allah teslim olacak mı? 👀",
                "ALLAH SIFIRA YAKLAŞTI!",
                
                // EMİR YOK OLMA
                "EMİR NEREDEYSE YOK! 😱",
                "Emir nefes almanın zorlaştı!",
                "Emir: İmdat! IMAM!",
                "Emir güçsüzleşiyor!",
                "Emir son darbede!",
                "Emir geri çekilmek zorunda!",
                "Emir: Bu oyun değil!",
                "Emir'in g��cü tükeniyor!",
                "EMİR YALVARIYOR! 'DUR!!'",
                "Emir sesini kaybediyor!",
                "Emir hata mı buldu?",
                "EMİR DÜŞÜYOR... DÜŞÜYOR...",
                "Emir son adımını atıyor!",
                "Emir kırılgan hale geldi!",
                "Emir: Bittin mi bu? 😭",
                "Emir hayatta kalabilir mi?",
                "EMİR SIFIRA YAKLAŞTI!"
            ],

            init() {
                this.createUnits();
                this.gameLoop();
            },

            createUnits() {
                this.allahUnits = [];
                this.emirUnits = [];

                for (let i = 0; i < this.allahSoldiers; i++) {
                    this.allahUnits.push({
                        x: Math.random() * canvas.width * 0.25,
                        y: Math.random() * canvas.height,
                        vx: 2 + Math.random() * 2,
                        vy: (Math.random() - 0.5) * 2,
                        size: 5,
                        health: 100,
                        type: 'allah'
                    });
                }

                for (let i = 0; i < this.emirSoldiers; i++) {
                    this.emirUnits.push({
                        x: canvas.width * 0.75 + Math.random() * canvas.width * 0.25,
                        y: Math.random() * canvas.height,
                        vx: -2 - Math.random() * 2,
                        vy: (Math.random() - 0.5) * 2,
                        size: 5,
                        health: 100,
                        type: 'emir'
                    });
                }
            },

            update() {
                if (this.paused || this.gameOver) return;

                this.time++;

                // Askerler hareketsin
                this.allahUnits.forEach(unit => {
                    unit.x += unit.vx;
                    unit.y += unit.vy;
                    if (unit.y < 0 || unit.y > canvas.height) unit.vy *= -1;
                    unit.y = Math.max(0, Math.min(canvas.height, unit.y));
                });

                this.emirUnits.forEach(unit => {
                    unit.x += unit.vx;
                    unit.y += unit.vy;
                    if (unit.y < 0 || unit.y > canvas.height) unit.vy *= -1;
                    unit.y = Math.max(0, Math.min(canvas.height, unit.y));
                });

                // Çatışmalar
                for (let i = 0; i < this.allahUnits.length; i++) {
                    for (let j = 0; j < this.emirUnits.length; j++) {
                        const dx = this.allahUnits[i].x - this.emirUnits[j].x;
                        const dy = this.allahUnits[i].y - this.emirUnits[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 50) {
                            if (Math.random() > 0.5) {
                                this.emirUnits[j].health -= 20;
                                this.playSound('hit');
                            } else {
                                this.allahUnits[i].health -= 20;
                                this.playSound('hit');
                            }
                        }
                    }
                }

                // Ölü askerleri temizle
                this.allahUnits = this.allahUnits.filter(u => {
                    if (u.health <= 0) {
                        this.createExplosion(u.x, u.y);
                        return false;
                    }
                    return true;
                });

                this.emirUnits = this.emirUnits.filter(u => {
                    if (u.health <= 0) {
                        this.createExplosion(u.x, u.y);
                        return false;
                    }
                    return true;
                });

                // Random bombalar
                if (this.time % 12 === 0 && Math.random() > 0.3) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    this.createExplosion(x, y);
                    this.playSound('bomb');

                    // Etraf askerler hasar alsın
                    this.allahUnits.forEach(u => {
                        const dx = u.x - x;
                        const dy = u.y - y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) u.health -= 30;
                    });

                    this.emirUnits.forEach(u => {
                        const dx = u.x - x;
                        const dy = u.y - y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) u.health -= 30;
                    });
                }

                // Explosions update
                this.explosions = this.explosions.filter(e => e.life > 0);
                this.explosions.forEach(e => {
                    e.radius += 5;
                    e.life -= 0.035;
                });

                // Random savaş mesajları (çok sık!)
                if (this.time % 60 === 0) {
                    const msg = this.komikMesajlar[Math.floor(Math.random() * this.komikMesajlar.length)];
                    
                    if (this.allahUnits.length > this.emirUnits.length) {
                        this.addMessage('allah', msg);
                    } else if (this.emirUnits.length > this.allahUnits.length) {
                        this.addMessage('emir', msg);
                    } else {
                        this.addMessage('neutral', msg);
                    }
                }

                // Oyun sonu kontrol
                if (this.allahUnits.length === 0 && this.emirUnits.length === 0) {
                    this.endGame("⚖️ BERABERE!\nHER İKİ ORDU DA YOK OLDU! ⚖️");
                } else if (this.allahUnits.length === 0) {
                    this.endGame("🔴 EMİR KAZANDI!\n\nALLAH YÖK OLDU!\nTARİH YAZILDI! 🔴");
                } else if (this.emirUnits.length === 0) {
                    this.endGame("🔵 ALLAH KAZANDI!\n\nEMİR YÖK OLDU!\nTARİH YAZILDI! 🔵");
                }

                this.updateStats();
            },

            createExplosion(x, y) {
                this.explosions.push({
                    x: x,
                    y: y,
                    radius: 0,
                    life: 1,
                    maxRadius: 200
                });
            },

            addMessage(type, text) {
                const now = new Date();
                const time = String(now.getHours()).padStart(2, '0') + ':' + 
                            String(now.getMinutes()).padStart(2, '0') + ':' +
                            String(now.getSeconds()).padStart(2, '0');

                const msg = document.createElement('div');
                msg.className = `chat-message ${type}-message`;
                msg.innerHTML = `<div class="message-time">[${time}]</div>${text}`;

                if (type === 'allah') {
                    document.getElementById('allahChat').appendChild(msg);
                    if (document.getElementById('allahChat').children.length > 20) {
                        document.getElementById('allahChat').removeChild(
                            document.getElementById('allahChat').firstChild
                        );
                    }
                } else if (type === 'emir') {
                    document.getElementById('emirChat').appendChild(msg);
                    if (document.getElementById('emirChat').children.length > 20) {
                        document.getElementById('emirChat').removeChild(
                            document.getElementById('emirChat').firstChild
                        );
                    }
                }
            },

            endGame(message) {
                this.gameOver = true;
                const winner = document.getElementById('winnerOverlay');
                winner.textContent = message;
                winner.style.display = 'block';
                this.playSound('victory');
            },

            playSound(type) {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    if (type === 'hit') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = 280 + Math.random() * 150;
                        gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.05);
                    } else if (type === 'bomb') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(400, audioContext.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(80, audioContext.currentTime + 0.7);
                        gain.gain.setValueAtTime(0.4, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.7);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.7);
                    } else if (type === 'victory') {
                        for (let i = 0; i < 6; i++) {
                            setTimeout(() => {
                                const o = audioContext.createOscillator();
                                const g = audioContext.createGain();
                                o.connect(g);
                                g.connect(audioContext.destination);
                                o.frequency.value = 800 + i * 150;
                                g.gain.setValueAtTime(0.25, audioContext.currentTime);
                                g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                                o.start();
                                o.stop(audioContext.currentTime + 0.3);
                            }, i * 150);
                        }
                    }
                } catch (e) {}
            },

            updateStats() {
                document.getElementById('allahCount').textContent = this.allahUnits.length;
                document.getElementById('emirCount').textContent = this.emirUnits.length;
                
                const allahHealth = Math.round((this.allahUnits.length / this.allahMaxSoldiers) * 100);
                const emirHealth = Math.round((this.emirUnits.length / this.emirMaxSoldiers) * 100);
                
                document.getElementById('allahPower').textContent = allahHealth + '%';
                document.getElementById('emirPower').textContent = emirHealth + '%';

                const total = this.allahUnits.length + this.emirUnits.length;
                if (total > 0) {
                    const allahProb = Math.round((this.allahUnits.length / total) * 100);
                    const emirProb = 100 - allahProb;
                    document.getElementById('allahWinChance').textContent = allahProb + '%';
                    document.getElementById('emirWinChance').textContent = emirProb + '%';
                }

                // Panelleri highlight et
                const centerPanel = document.querySelector('.center-panel');
                centerPanel.classList.remove('allah-leading', 'emir-leading');
                
                if (this.allahUnits.length > this.emirUnits.length + 3) {
                    centerPanel.classList.add('allah-leading');
                } else if (this.emirUnits.length > this.allahUnits.length + 3) {
                    centerPanel.classList.add('emir-leading');
                }
            },

            draw() {
                // Harita arkaplan
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#1a3a4a');
                gradient.addColorStop(0.5, '#0f1a25');
                gradient.addColorStop(1, '#1a3a4a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Dağ çizimleri (arka plan)
                ctx.fillStyle = 'rgba(80, 100, 120, 0.1)';
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo((i * canvas.width / 5) - 50, canvas.height);
                    ctx.lineTo((i * canvas.width / 5) + 100, canvas.height * 0.5);
                    ctx.lineTo((i * canvas.width / 5) + 200, canvas.height);
                    ctx.fill();
                }

                // Orta çizgi
                ctx.strokeStyle = 'rgba(0, 255, 136, 0.25)';
                ctx.lineWidth = 5;
                ctx.setLineDash([40, 25]);
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);

                // Allah askerlerini çiz
                ctx.fillStyle = '#00d4ff';
                ctx.shadowColor = 'rgba(0, 212, 255, 0.9)';
                ctx.shadowBlur = 12;
                this.allahUnits.forEach(unit => {
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, unit.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowColor = 'transparent';

                // Emir askerlerini çiz
                ctx.fillStyle = '#ff1744';
                ctx.shadowColor = 'rgba(255, 23, 68, 0.9)';
                ctx.shadowBlur = 12;
                this.emirUnits.forEach(unit => {
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, unit.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowColor = 'transparent';

                // Explosions (çok güzel)
                this.explosions.forEach(e => {
                    const gradient = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
                    gradient.addColorStop(0, `rgba(255, 220, 0, ${e.life * 0.7})`);
                    gradient.addColorStop(0.4, `rgba(255, 150, 0, ${e.life * 0.4})`);
                    gradient.addColorStop(1, `rgba(255, 23, 68, 0)`);
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // İç çevre
                    ctx.strokeStyle = `rgba(255, 220, 0, ${e.life * 0.8})`;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                });

                // Efsaneler
                ctx.font = 'bold 22px Arial';
                ctx.fillStyle = '#00d4ff';
                ctx.textAlign = 'left';
                ctx.fillText('🔵 ALLAH', 30, canvas.height - 20);

                ctx.fillStyle = '#ff1744';
                ctx.textAlign = 'right';
                ctx.fillText('EMİR 🔴', canvas.width - 30, canvas.height - 20);

                // Ortada skoru
                ctx.font = 'bold 64px Arial';
                ctx.fillStyle = '#d4af37';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(212, 175, 55, 0.6)';
                ctx.shadowBlur = 25;
                ctx.fillText(`${this.allahUnits.length} ⚔ ${this.emirUnits.length}`, canvas.width / 2, canvas.height / 2 + 15);
                ctx.shadowColor = 'transparent';
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            },

            togglePause() {
                this.paused = !this.paused;
            },

            reset() {
                this.allahSoldiers = 50;
                this.emirSoldiers = 50;
                this.paused = false;
                this.gameOver = false;
                this.time = 0;
                this.createUnits();
                document.getElementById('winnerOverlay').style.display = 'none';
                document.getElementById('allahChat').innerHTML = '';
                document.getElementById('emirChat').innerHTML = '';
                this.updateStats();
            }
        };

        battle.init();
    </script>
</body>
</html>
