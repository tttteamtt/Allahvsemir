<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allah vs Emir - Savaş Oyunu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid #e94560;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 
                                   inset 0 1px 0 rgba(255, 255, 255, 0.1),
                                   0 0 20px rgba(233, 69, 96, 0.5); }
            50% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 
                             inset 0 1px 0 rgba(255, 255, 255, 0.1),
                             0 0 40px rgba(233, 69, 96, 0.8); }
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #00d4ff, #0099ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 2px solid #00d4ff;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .stat-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .stat-box:hover::before {
            left: 100%;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }

        .stat-box h3 {
            color: #00ff88;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .stat-box.allah .stat-value {
            color: #00d4ff;
            text-shadow: 0 0 10px #00d4ff;
        }

        .stat-box.emir .stat-value {
            color: #ff6b9d;
            text-shadow: 0 0 10px #ff6b9d;
        }

        .percentage {
            font-size: 0.8em;
            color: #ffff00;
            margin-top: 8px;
            font-weight: bold;
        }

        .status-message {
            font-size: 0.9em;
            color: #00ff88;
            margin-top: 8px;
            min-height: 20px;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .game-area {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #00ff88;
            position: relative;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            background: radial-gradient(circle at 30% 30%, #0f3460, #0a0e27);
            border-radius: 10px;
            cursor: crosshair;
            box-shadow: inset 0 0 50px rgba(0, 255, 136, 0.1);
            max-width: 100%;
            height: auto;
        }

        .controls-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.6);
        }

        button:active {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info-section {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border-left: 5px solid #00ff88;
        }

        .info-section h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .dynamic-text {
            font-size: 1.1em;
            color: #ffff00;
            font-weight: bold;
            line-height: 1.6;
            min-height: 40px;
            animation: fadeInOut 3s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }

        .effects-display {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .effect-item {
            background: rgba(0, 255, 136, 0.1);
            border-left: 3px solid #00ff88;
            padding: 10px;
            border-radius: 5px;
            color: #00ff88;
        }

        .effect-item.active {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .score-history {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
        }

        .score-entry {
            padding: 8px;
            margin: 5px 0;
            background: rgba(102, 126, 234, 0.2);
            border-left: 3px solid #f5576c;
            border-radius: 3px;
            font-size: 0.9em;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 2em;
            }

            .game-area {
                min-height: 300px;
            }
        }

        .combo-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.6);
            z-index: 1000;
            animation: comboPopIn 0.5s ease-out;
        }

        @keyframes comboPopIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ ALLAH vs EMİR ⚔️</h1>

        <div class="stats-container">
            <div class="stat-box allah">
                <h3>Allah</h3>
                <div class="stat-value" id="allahScore">0</div>
                <div class="percentage" id="allahPercent">0%</div>
                <div class="status-message" id="allahStatus">Hazırlanıyor...</div>
            </div>

            <div class="stat-box emir">
                <h3>Emir</h3>
                <div class="stat-value" id="emirScore">0</div>
                <div class="percentage" id="emirPercent">0%</div>
                <div class="status-message" id="emirStatus">Hazırlanıyor...</div>
            </div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
        </div>

        <div class="controls-container">
            <button onclick="game.clickAllah()">🔵 ALLAH</button>
            <button onclick="game.clickEmir()">🔴 EMİR</button>
            <button onclick="game.bombAttack()">💣 BOMBA</button>
            <button onclick="game.superPower()">⚡ SÜPER GÜÇ</button>
            <button onclick="game.reset()">🔄 SIFIRLA</button>
            <button onclick="game.toggleSound()">🔊 SES</button>
        </div>

        <div class="info-section">
            <h3>📢 Oyun Mesajı:</h3>
            <div class="dynamic-text" id="dynamicText">Oyun başlamak için butonlara tıkla!</div>
            
            <div class="effects-display">
                <div class="effect-item" id="bombEffect">💣 Bomba Efekti</div>
                <div class="effect-item" id="lightEffect">⚡ Işık Efekti</div>
                <div class="effect-item" id="soundEffect">🔊 Ses Efekti</div>
                <div class="effect-item" id="animEffect">✨ Animasyon</div>
            </div>

            <div class="score-history" id="scoreHistory"></div>
        </div>
    </div>

    <div class="combo-counter" id="comboCounter" style="display: none;">
        🔥 COMBO: <span id="comboCount">0</span>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Responsive canvas
        function resizeCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            canvas.width = Math.min(rect.width - 40, 800);
            canvas.height = Math.min(canvas.width * 0.5, 400);
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const game = {
            allahScore: 0,
            emirScore: 0,
            combo: 0,
            lastClickTime: 0,
            soundEnabled: true,
            particles: [],
            explosions: [],
            history: [],

            // Dynamik mesajlar
            messages: [
                "Allah çok güçlü! 💪",
                "Emir hamlesiyor! 🔥",
                "Epik savaş! ⚔️",
                "Bomba patladı! 💥",
                "Muhteşem hamle! 🌟",
                "Hızını arttır! 🚀",
                "Başarılı vurdu! 🎯",
                "Karşı atağa hazırlan! 🛡️",
                "İnanılmaz! 🤯",
                "Devam et! 🔥",
                "Kimin kazanacağı belli değil! 🤔",
                "Sağlı sollu saldırıyor! 🌪️",
                "Süper güç hazırlanıyor! ⚡",
                "Her iki taraf da güçlü! 💥",
                "Eğleniyoruz! 🎉"
            ],

            // Renk paleti (bol çeşit)
            colors: {
                allah: ['#00d4ff', '#0099ff', '#00ff88', '#00ffff'],
                emir: ['#ff6b9d', '#ff1744', '#ff6b00', '#ff00ff'],
                neutral: ['#ffff00', '#00ff88', '#00d4ff', '#ff00ff'],
                explosions: ['#ffff00', '#ff6b00', '#ff1744', '#ff00ff', '#00ff88']
            },

            updateScores() {
                document.getElementById('allahScore').textContent = this.allahScore;
                document.getElementById('emirScore').textContent = this.emirScore;

                const total = this.allahScore + this.emirScore;
                if (total > 0) {
                    const allahPercent = Math.round((this.allahScore / total) * 100);
                    const emirPercent = 100 - allahPercent;
                    document.getElementById('allahPercent').textContent = allahPercent + '%';
                    document.getElementById('emirPercent').textContent = emirPercent + '%';
                    
                    // Durum mesajları
                    if (allahPercent > emirPercent + 10) {
                        document.getElementById('allahStatus').textContent = '🔵 ÖNDEDEYİZ!';
                        document.getElementById('emirStatus').textContent = '🔴 Geri düşü...';
                    } else if (emirPercent > allahPercent + 10) {
                        document.getElementById('emirStatus').textContent = '🔴 ÖNDEDEYİZ!';
                        document.getElementById('allahStatus').textContent = '🔵 Geri düşü...';
                    } else {
                        document.getElementById('allahStatus').textContent = '⚖️ Çok yakın!';
                        document.getElementById('emirStatus').textContent = '⚖️ Çok yakın!';
                    }
                }
            },

            clickAllah() {
                this.allahScore += 1;
                this.addCombo();
                this.createParticles(canvas.width / 4, canvas.height / 2, this.colors.allah);
                this.playSound('click1');
                this.updateDynamicText();
                this.updateScores();
                this.recordHistory('Allah +1');
            },

            clickEmir() {
                this.emirScore += 1;
                this.addCombo();
                this.createParticles(canvas.width * 3 / 4, canvas.height / 2, this.colors.emir);
                this.playSound('click2');
                this.updateDynamicText();
                this.updateScores();
                this.recordHistory('Emir +1');
            },

            bombAttack() {
                const damage = Math.floor(Math.random() * 3) + 5; // 5-7 hasar
                if (Math.random() > 0.5) {
                    this.allahScore += damage;
                    this.recordHistory(`Allah BOMBA! +${damage}`);
                } else {
                    this.emirScore += damage;
                    this.recordHistory(`Emir BOMBA! +${damage}`);
                }
                this.playSound('bomb');
                this.createExplosion(canvas.width / 2, canvas.height / 2);
                this.updateScores();
                this.showEffect('bombEffect');
            },

            superPower() {
                const bonus = Math.floor(Math.random() * 5) + 10; // 10-14 bonus
                if (Math.random() > 0.5) {
                    this.allahScore += bonus;
                    this.recordHistory(`Allah SÜPER GÜÇ! +${bonus}`);
                } else {
                    this.emirScore += bonus;
                    this.recordHistory(`Emir SÜPER GÜÇ! +${bonus}`);
                }
                this.playSound('power');
                this.createExplosion(canvas.width / 2, canvas.height / 2);
                this.updateScores();
                this.showEffect('lightEffect');
            },

            addCombo() {
                const now = Date.now();
                if (now - this.lastClickTime < 500) {
                    this.combo++;
                } else {
                    this.combo = 1;
                }
                this.lastClickTime = now;

                if (this.combo > 1) {
                    document.getElementById('comboCounter').style.display = 'block';
                    document.getElementById('comboCount').textContent = this.combo;
                    
                    if (this.combo % 5 === 0) {
                        this.playSound('combo');
                    }
                } else {
                    document.getElementById('comboCounter').style.display = 'none';
                }
            },

            createParticles(x, y, colors) {
                for (let i = 0; i < 15; i++) {
                    const angle = (Math.PI * 2 * i) / 15;
                    const speed = 3 + Math.random() * 3;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        size: 3 + Math.random() * 5
                    });
                }
            },

            createExplosion(x, y) {
                this.explosions.push({
                    x: x,
                    y: y,
                    radius: 0,
                    maxRadius: 150,
                    life: 1,
                    color: this.colors.explosions
                });

                for (let i = 0; i < 40; i++) {
                    const angle = (Math.PI * 2 * Math.random());
                    const speed = 2 + Math.random() * 4;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        color: this.colors.explosions[Math.floor(Math.random() * this.colors.explosions.length)],
                        size: 5 + Math.random() * 10
                    });
                }
            },

            playSound(type) {
                if (!this.soundEnabled) return;

                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                if (type === 'click1') {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = 400;
                    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.1);
                } else if (type === 'click2') {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = 300;
                    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.1);
                } else if (type === 'bomb') {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.setValueAtTime(200, audioContext.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.5, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.3);
                } else if (type === 'power') {
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const osc = audioContext.createOscillator();
                            const gain = audioContext.createGain();
                            osc.connect(gain);
                            gain.connect(audioContext.destination);
                            osc.frequency.value = 600 + i * 200;
                            gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                            osc.start();
                            osc.stop(audioContext.currentTime + 0.15);
                        }, i * 50);
                    }
                } else if (type === 'combo') {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = 800;
                    gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.2);
                }
            },

            updateDynamicText() {
                const randomMessage = this.messages[Math.floor(Math.random() * this.messages.length)];
                document.getElementById('dynamicText').textContent = randomMessage;
            },

            showEffect(elementId) {
                const element = document.getElementById(elementId);
                element.classList.add('active');
                setTimeout(() => {
                    element.classList.remove('active');
                }, 1000);
            },

            recordHistory(action) {
                this.history.unshift({
                    action: action,
                    time: new Date().toLocaleTimeString('tr-TR')
                });

                if (this.history.length > 20) {
                    this.history.pop();
                }

                this.updateHistoryDisplay();
            },

            updateHistoryDisplay() {
                const historyDiv = document.getElementById('scoreHistory');
                historyDiv.innerHTML = this.history.map(entry => 
                    `<div class="score-entry">${entry.action} <span style="color: #00ff88;">[${entry.time}]</span></div>`
                ).join('');
            },

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                alert(this.soundEnabled ? '🔊 Ses AÇIK' : '🔇 Ses KAPALI');
            },

            reset() {
                this.allahScore = 0;
                this.emirScore = 0;
                this.combo = 0;
                this.particles = [];
                this.explosions = [];
                this.history = [];
                this.updateScores();
                this.updateHistoryDisplay();
                document.getElementById('dynamicText').textContent = 'Oyun sıfırlandı! Yeniden başla!';
                this.playSound('power');
            },

            update() {
                // Particle update
                this.particles = this.particles.filter(p => p.life > 0);
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2; // gravity
                    p.life -= 0.02;
                });

                // Explosion update
                this.explosions = this.explosions.filter(e => e.life > 0);
                this.explosions.forEach(e => {
                    e.radius = e.maxRadius * (1 - e.life);
                    e.life -= 0.02;
                });
            },

            draw() {
                // Clear canvas with gradient
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#0f3460');
                gradient.addColorStop(0.5, '#1a1a2e');
                gradient.addColorStop(1, '#0f3460');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw center line
                ctx.strokeStyle = 'rgba(0, 255, 136, 0.2)';
                ctx.lineWidth = 2;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);

                // Draw team areas
                ctx.fillStyle = 'rgba(0, 212, 255, 0.05)';
                ctx.fillRect(0, 0, canvas.width / 2, canvas.height);
                
                ctx.fillStyle = 'rgba(255, 107, 157, 0.05)';
                ctx.fillRect(canvas.width / 2, 0, canvas.width / 2, canvas.height);

                // Draw labels
                ctx.font = 'bold 24px Arial';
                ctx.fillStyle = '#00d4ff';
                ctx.textAlign = 'center';
                ctx.fillText('🔵 ALLAH', canvas.width / 4, 50);

                ctx.fillStyle = '#ff6b9d';
                ctx.fillText('🔴 EMİR', canvas.width * 3 / 4, 50);

                // Draw explosions
                this.explosions.forEach(e => {
                    const color = e.color[Math.floor(Math.random() * e.color.length)];
                    ctx.fillStyle = color.replace(')', `, ${e.life * 0.5})`).replace('rgb', 'rgba');
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // Explosion ring
                    ctx.strokeStyle = color.replace(')', `, ${e.life * 0.8})`).replace('rgb', 'rgba');
                    ctx.lineWidth = 3;
                    ctx.stroke();
                });

                // Draw particles
                this.particles.forEach(p => {
                    ctx.fillStyle = p.color.replace(')', `, ${p.life})`).replace('rgb', 'rgba');
                    if (ctx.fillStyle.includes('rgb(')) {
                        ctx.fillStyle = p.color;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();

                    // Particle glow
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = p.life * 0.5;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                });

                // Draw score indicators in middle
                ctx.font = 'bold 20px Arial';
                ctx.fillStyle = '#ffff00';
                ctx.textAlign = 'center';
                ctx.fillText(`${this.allahScore} - ${this.emirScore}`, canvas.width / 2, canvas.height / 2);
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        // Start game loop
        game.gameLoop();
        game.updateScores();
        game.updateDynamicText();

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '1') game.clickAllah();
            if (e.key === '2') game.clickEmir();
            if (e.key === '3') game.bombAttack();
            if (e.key === '4') game.superPower();
            if (e.key === '0') game.reset();
        });

        // Mouse click on canvas
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            
            if (x < canvas.width / 2) {
                game.clickAllah();
            } else {
                game.clickEmir();
            }
        });

        // Initial update
        window.addEventListener('load', () => {
            resizeCanvas();
        });
    </script>
</body>
</html>
