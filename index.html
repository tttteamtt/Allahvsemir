<script>
let visitors = parseInt(localStorage.getItem('visitors') || '0') + 1;
localStorage.setItem('visitors', visitors);
document.getElementById('visitorCount').textContent = visitors;

const canvas = document.getElementById('battlefieldCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.offsetWidth;
    canvas.height = container.offsetHeight - 80;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

setInterval(() => {
    document.getElementById('clock').textContent =
        new Date().toLocaleTimeString();
}, 1000);

const battle = {

    // OPTİMİZE EDİLDİ
    allahSoldiers: 14,
    emirSoldiers: 14,
    maxSoldiers: 14,

    allahUnits: [],
    emirUnits: [],
    explosions: [],

    totalKilled: 0,
    time: 0,
    paused: false,
    gameOver: false,
    lastFrame: 0,

    // Spam azaltıldı
    messages: [
        "⚔️ Çarpışma başladı!",
        "💥 Büyük darbe!",
        "🔥 Kritik hasar!",
        "⚡ Hızlı saldırı!",
        "💀 Bir asker düştü!",
        "🎯 İsabetli vuruş!"
    ],

    init() {
        this.createUnits();
        this.loop();
    },

    createUnits() {
        this.allahUnits = [];
        this.emirUnits = [];

        for (let i = 0; i < this.allahSoldiers; i++) {
            this.allahUnits.push({
                x: Math.random() * canvas.width * 0.3,
                y: Math.random() * canvas.height,
                vx: 1,
                vy: (Math.random() - 0.5),
                hp: 100
            });
        }

        for (let i = 0; i < this.emirSoldiers; i++) {
            this.emirUnits.push({
                x: canvas.width * 0.7 + Math.random() * canvas.width * 0.3,
                y: Math.random() * canvas.height,
                vx: -1,
                vy: (Math.random() - 0.5),
                hp: 100
            });
        }
    },

    update() {
        if (this.paused || this.gameOver) return;

        this.time++;

        // 1 DAKİKA (30fps * 60)
        if (this.time > 1800) {
            this.finish();
        }

        [...this.allahUnits, ...this.emirUnits].forEach(u => {
            u.x += u.vx;
            u.y += u.vy;
            if (u.y < 0 || u.y > canvas.height) u.vy *= -1;
        });

        // Hafifletilmiş çarpışma
        for (let a of this.allahUnits) {
            for (let e of this.emirUnits) {
                let dx = a.x - e.x;
                let dy = a.y - e.y;

                if (dx * dx + dy * dy < 900) { // 30px
                    if (Math.random() > 0.5) e.hp -= 5;
                    else a.hp -= 5;
                }
            }
        }

        let before = this.allahUnits.length + this.emirUnits.length;

        this.allahUnits = this.allahUnits.filter(u => u.hp > 0);
        this.emirUnits = this.emirUnits.filter(u => u.hp > 0);

        let after = this.allahUnits.length + this.emirUnits.length;
        this.totalKilled += (before - after);

        // Seyrek bomba
        if (this.time % 240 === 0 && Math.random() > 0.8) {
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;

            this.explosions.push({x, y, r: 0, life: 1});

            [...this.allahUnits, ...this.emirUnits].forEach(u=>{
                if ((u.x-x)**2 + (u.y-y)**2 < 12000)
                    u.hp -= 15;
            });
        }

        this.explosions = this.explosions.filter(e=>e.life>0);
        this.explosions.forEach(e=>{
            e.r+=4;
            e.life-=0.05;
        });

        // 3 saniyede 1 mesaj
        if (this.time % 90 === 0) {
            this.addMessage(
                Math.random()>0.5 ? 'allahChat' : 'emirChat',
                this.messages[Math.floor(Math.random()*this.messages.length)]
            );
        }

        if (this.allahUnits.length === 0 || this.emirUnits.length === 0) {
            this.finish();
        }

        this.updateStats();
    },

    draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle="#00d4ff";
        this.allahUnits.forEach(u=>{
            ctx.beginPath();
            ctx.arc(u.x,u.y,4,0,Math.PI*2);
            ctx.fill();
        });

        ctx.fillStyle="#ff1744";
        this.emirUnits.forEach(u=>{
            ctx.beginPath();
            ctx.arc(u.x,u.y,4,0,Math.PI*2);
            ctx.fill();
        });

        this.explosions.forEach(e=>{
            ctx.beginPath();
            ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
            ctx.strokeStyle=`rgba(255,150,0,${e.life})`;
            ctx.stroke();
        });
    },

    addMessage(panel, text){
        const box = document.getElementById(panel);
        if(!box) return;

        const div = document.createElement("div");
        div.className="chat-message neutral-message";
        div.innerHTML=`[${new Date().toLocaleTimeString()}] ${text}`;
        box.appendChild(div);

        if(box.children.length>15)
            box.removeChild(box.firstChild);

        box.scrollTop = box.scrollHeight;
    },

    updateStats(){
        document.getElementById('allahCount').textContent=this.allahUnits.length;
        document.getElementById('emirCount').textContent=this.emirUnits.length;
        document.getElementById('infoAllah').textContent=this.allahUnits.length;
        document.getElementById('infoEmir').textContent=this.emirUnits.length;
        document.getElementById('totalKilled').textContent=
            "💀 Toplam Öldü: "+this.totalKilled;
        document.getElementById('footerKilled').textContent=this.totalKilled;
    },

    finish(){
        this.gameOver=true;

        let winner =
            this.allahUnits.length > this.emirUnits.length ? "🔵 ALLAH KAZANDI" :
            this.emirUnits.length > this.allahUnits.length ? "🔴 EMİR KAZANDI" :
            "⚖️ BERABERE";

        document.getElementById("winnerContent").innerHTML=`
            <div class="winner-title">${winner}</div>
            <div>💀 Toplam Öldü: ${this.totalKilled}</div>
            <button class="restart-button"
                onclick="battle.reset();document.getElementById('winnerOverlay').style.display='none';">
                🔄 TEKRAR BAŞLA
            </button>
        `;

        document.getElementById("winnerOverlay").style.display="flex";
    },

    reset(){
        this.time=0;
        this.totalKilled=0;
        this.gameOver=false;
        this.createUnits();
    },

    loop(){
        const now=performance.now();
        if(now-this.lastFrame>33){
            this.update();
            this.draw();
            this.lastFrame=now;
        }
        requestAnimationFrame(()=>this.loop());
    }
};

battle.init();
</script>
