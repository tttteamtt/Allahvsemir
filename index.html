<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allah vs Emir - Otomatik Savaş Simulatörü</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
        }

        #battlefieldCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(10, 10, 20, 0.95);
            border: 2px solid #444;
            padding: 20px;
            border-radius: 10px;
            z-index: 100;
            color: #fff;
            font-size: 18px;
        }

        .hud h2 {
            margin-bottom: 15px;
            color: #d4af37;
            text-align: center;
            font-size: 24px;
        }

        .battle-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 15px;
        }

        .team-stat {
            text-align: center;
        }

        .team-stat.allah {
            color: #7fa3c0;
        }

        .team-stat.emir {
            color: #c07a7a;
        }

        .team-stat .name {
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .team-stat .count {
            font-size: 28px;
            font-weight: 900;
        }

        .team-stat .health {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.8;
        }

        .battle-info {
            background: rgba(40, 40, 60, 0.8);
            padding: 12px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
            color: #a0a8b8;
        }

        .battle-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.95);
            border: 2px solid #d4af37;
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 100;
            color: #d4af37;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            max-width: 80%;
            animation: messageShow 0.5s ease;
        }

        @keyframes messageShow {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 20, 0.95);
            border: 2px solid #444;
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
        }

        .controls button {
            background: #2a3a4a;
            border: 1px solid #3a5a7a;
            color: #b0c8e0;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .controls button:hover {
            background: #3a5a7a;
            border-color: #5a8aaa;
        }

        .winner-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.98);
            border: 3px solid #d4af37;
            padding: 40px 60px;
            border-radius: 20px;
            z-index: 200;
            color: #d4af37;
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            display: none;
            animation: winnerShow 0.8s ease;
        }

        @keyframes winnerShow {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="battlefieldCanvas"></canvas>
        
        <div class="hud">
            <h2>⚔️ SAVAŞ ALANINDA ⚔️</h2>
            <div class="battle-stats">
                <div class="team-stat allah">
                    <div class="name">🔵 ALLAH ORDUSU</div>
                    <div class="count" id="allahCount">50</div>
                    <div class="health">Asker Gücü: <span id="allahHealth">100</span>%</div>
                </div>
                <div class="team-stat emir">
                    <div class="name">🔴 EMİR ORDUSU</div>
                    <div class="count" id="emirCount">50</div>
                    <div class="health">Asker Gücü: <span id="emirHealth">100</span>%</div>
                </div>
            </div>
            <div class="battle-info">
                <div id="battleStatus">Savaş başlıyor...</div>
                <div id="probabilityInfo" style="margin-top: 8px;">Kazanma Olasılığı: Allah %50 - Emir %50</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="battle.togglePause()">⏸️ DURAKLAT</button>
            <button onclick="battle.reset()">🔄 SIFIRLA</button>
        </div>

        <div class="battle-message" id="battleMessage" style="display: none;"></div>
        <div class="winner-message" id="winnerMessage"></div>
    </div>

    <script>
        const canvas = document.getElementById('battlefieldCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const battle = {
            allahSoldiers: 50,
            emirSoldiers: 50,
            allahMaxSoldiers: 50,
            emirMaxSoldiers: 50,
            paused: false,
            gameOver: false,
            time: 0,
            
            allahUnits: [],
            emirUnits: [],
            explosions: [],
            messages: [],

            battleMessages: [
                { text: "Allah ordusunun saldırısı başladı!", type: "allah" },
                { text: "Emir karşı atağa geçiyor!", type: "emir" },
                { text: "Şiddetli çatışma başladı!", type: "neutral" },
                { text: "Bomba patlaması meydanda!", type: "bomb" },
                { text: "Allah yeniyor!", type: "allah" },
                { text: "Emir galip geliyor!", type: "emir" },
                { text: "Savaş şiddetleniyor!", type: "neutral" },
                { text: "Allah ordusunun morali düşüyor!", type: "emir" },
                { text: "Emir ordusunun morali düşüyor!", type: "allah" },
                { text: "Harita ateş altında!", type: "bomb" },
                { text: "Allah'ın askerleri yığılıyor!", type: "allah" },
                { text: "Emir'in askerleri yığılıyor!", type: "emir" },
                { text: "Ağır kayıplar alınıyor!", type: "neutral" },
                { text: "Allah yok oldu!", type: "emir" },
                { text: "Emir yok oldu!", type: "allah" },
                { text: "Allah kaybetti! Emir kazandı!", type: "emir" },
                { text: "Emir kaybetti! Allah kazandı!", type: "allah" }
            ],

            init() {
                this.createUnits();
                this.gameLoop();
            },

            createUnits() {
                this.allahUnits = [];
                this.emirUnits = [];

                for (let i = 0; i < this.allahSoldiers; i++) {
                    this.allahUnits.push({
                        x: Math.random() * canvas.width * 0.35,
                        y: Math.random() * canvas.height,
                        vx: 1 + Math.random() * 1.5,
                        vy: (Math.random() - 0.5) * 1,
                        size: 4,
                        health: 100,
                        type: 'allah'
                    });
                }

                for (let i = 0; i < this.emirSoldiers; i++) {
                    this.emirUnits.push({
                        x: canvas.width * 0.65 + Math.random() * canvas.width * 0.35,
                        y: Math.random() * canvas.height,
                        vx: -1 - Math.random() * 1.5,
                        vy: (Math.random() - 0.5) * 1,
                        size: 4,
                        health: 100,
                        type: 'emir'
                    });
                }
            },

            update() {
                if (this.paused || this.gameOver) return;

                this.time++;

                // Askerler hareketsin
                this.allahUnits.forEach(unit => {
                    unit.x += unit.vx;
                    unit.y += unit.vy;
                    if (unit.y < 0 || unit.y > canvas.height) unit.vy *= -1;
                    unit.y = Math.max(0, Math.min(canvas.height, unit.y));
                });

                this.emirUnits.forEach(unit => {
                    unit.x += unit.vx;
                    unit.y += unit.vy;
                    if (unit.y < 0 || unit.y > canvas.height) unit.vy *= -1;
                    unit.y = Math.max(0, Math.min(canvas.height, unit.y));
                });

                // Çatışmalar
                for (let i = 0; i < this.allahUnits.length; i++) {
                    for (let j = 0; j < this.emirUnits.length; j++) {
                        const dx = this.allahUnits[i].x - this.emirUnits[j].x;
                        const dy = this.allahUnits[i].y - this.emirUnits[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 30) {
                            if (Math.random() > 0.5) {
                                this.emirUnits[j].health -= 10;
                                this.playSound('hit');
                            } else {
                                this.allahUnits[i].health -= 10;
                                this.playSound('hit');
                            }
                        }
                    }
                }

                // Ölü askerleri temizle
                this.allahUnits = this.allahUnits.filter(u => {
                    if (u.health <= 0) {
                        this.createExplosion(u.x, u.y);
                        return false;
                    }
                    return true;
                });

                this.emirUnits = this.emirUnits.filter(u => {
                    if (u.health <= 0) {
                        this.createExplosion(u.x, u.y);
                        return false;
                    }
                    return true;
                });

                // Random bombalar
                if (this.time % 20 === 0 && Math.random() > 0.6) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    this.createExplosion(x, y);
                    this.playSound('bomb');

                    // Etraf askerler hasar alsın
                    this.allahUnits.forEach(u => {
                        const dx = u.x - x;
                        const dy = u.y - y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 80) u.health -= 20;
                    });

                    this.emirUnits.forEach(u => {
                        const dx = u.x - x;
                        const dy = u.y - y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 80) u.health -= 20;
                    });
                }

                // Explosions update
                this.explosions = this.explosions.filter(e => e.life > 0);
                this.explosions.forEach(e => {
                    e.radius += 3;
                    e.life -= 0.05;
                });

                // Mesajlar update
                this.messages = this.messages.filter(m => m.time > 0);
                this.messages.forEach(m => m.time--);

                // Random savaş mesajları
                if (this.time % 150 === 0) {
                    const msg = this.battleMessages[Math.floor(Math.random() * this.battleMessages.length)];
                    this.showMessage(msg.text);
                }

                // Oyun sonu kontrol
                if (this.allahUnits.length === 0 && this.emirUnits.length === 0) {
                    this.endGame("Berabere! Her iki ordu da yok oldu!");
                } else if (this.allahUnits.length === 0) {
                    this.endGame("EMİR KAZANDI! Allah ordusunun hiç askeri kalmadı! 🔴");
                } else if (this.emirUnits.length === 0) {
                    this.endGame("ALLAH KAZANDI! Emir ordusunun hiç askeri kalmadı! 🔵");
                }

                this.updateHUD();
            },

            createExplosion(x, y) {
                this.explosions.push({
                    x: x,
                    y: y,
                    radius: 0,
                    life: 1,
                    maxRadius: 150
                });
            },

            showMessage(text) {
                const msg = document.getElementById('battleMessage');
                msg.textContent = text;
                msg.style.display = 'block';
                setTimeout(() => {
                    msg.style.display = 'none';
                }, 3000);
            },

            endGame(message) {
                this.gameOver = true;
                const winner = document.getElementById('winnerMessage');
                winner.textContent = message;
                winner.style.display = 'block';
                this.playSound('victory');
            },

            playSound(type) {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    if (type === 'hit') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = 200 + Math.random() * 100;
                        gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.05);
                    } else if (type === 'bomb') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(300, audioContext.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.5);
                        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.5);
                    } else if (type === 'victory') {
                        for (let i = 0; i < 5; i++) {
                            setTimeout(() => {
                                const o = audioContext.createOscillator();
                                const g = audioContext.createGain();
                                o.connect(g);
                                g.connect(audioContext.destination);
                                o.frequency.value = 600 + i * 100;
                                g.gain.setValueAtTime(0.2, audioContext.currentTime);
                                g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                                o.start();
                                o.stop(audioContext.currentTime + 0.2);
                            }, i * 100);
                        }
                    }
                } catch (e) {}
            },

            updateHUD() {
                document.getElementById('allahCount').textContent = this.allahUnits.length;
                document.getElementById('emirCount').textContent = this.emirUnits.length;
                
                const allahHealth = this.allahUnits.length > 0 ? 
                    Math.round((this.allahUnits.length / this.allahMaxSoldiers) * 100) : 0;
                const emirHealth = this.emirUnits.length > 0 ? 
                    Math.round((this.emirUnits.length / this.emirMaxSoldiers) * 100) : 0;
                
                document.getElementById('allahHealth').textContent = allahHealth;
                document.getElementById('emirHealth').textContent = emirHealth;

                const total = this.allahUnits.length + this.emirUnits.length;
                if (total > 0) {
                    const allahProb = Math.round((this.allahUnits.length / total) * 100);
                    const emirProb = 100 - allahProb;
                    document.getElementById('probabilityInfo').textContent = 
                        `Kazanma Olasılığı: Allah %${allahProb} - Emir %${emirProb}`;
                }

                if (this.allahUnits.length > this.emirUnits.length) {
                    document.getElementById('battleStatus').textContent = "Allah öncü pozisyonda! 🔵";
                } else if (this.emirUnits.length > this.allahUnits.length) {
                    document.getElementById('battleStatus').textContent = "Emir öncü pozisyonda! 🔴";
                } else {
                    document.getElementById('battleStatus').textContent = "Savaş dengesi korunuyor! ⚖️";
                }
            },

            draw() {
                // Harita arkaplan
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#1a2840');
                gradient.addColorStop(0.5, '#0f1520');
                gradient.addColorStop(1, '#1a2840');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Orta çizgi
                ctx.strokeStyle = 'rgba(122, 160, 128, 0.15)';
                ctx.lineWidth = 3;
                ctx.setLineDash([20, 15]);
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);

                // Allah askerlerini çiz
                ctx.fillStyle = '#7fa3c0';
                this.allahUnits.forEach(unit => {
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, unit.size, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Emir askerlerini çiz
                ctx.fillStyle = '#c07a7a';
                this.emirUnits.forEach(unit => {
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, unit.size, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Explosions
                this.explosions.forEach(e => {
                    ctx.fillStyle = '#d4af37';
                    ctx.globalAlpha = e.life * 0.6;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = '#d4af37';
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = e.life;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                });

                // Efsaneler
                ctx.font = 'bold 20px Arial';
                ctx.fillStyle = '#7fa3c0';
                ctx.textAlign = 'left';
                ctx.fillText('🔵 ALLAH ORDUSU', 20, 120);

                ctx.fillStyle = '#c07a7a';
                ctx.textAlign = 'right';
                ctx.fillText('🔴 EMİR ORDUSU', canvas.width - 20, 120);
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            },

            togglePause() {
                this.paused = !this.paused;
                alert(this.paused ? "⏸️ Durakladı" : "▶️ Devam ediyor");
            },

            reset() {
                this.allahSoldiers = 50;
                this.emirSoldiers = 50;
                this.paused = false;
                this.gameOver = false;
                this.time = 0;
                this.createUnits();
                document.getElementById('winnerMessage').style.display = 'none';
                this.updateHUD();
            }
        };

        battle.init();
    </script>
</body>
</html>
