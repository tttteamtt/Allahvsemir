            padding: 10px;
        }

            line-height: 1.4;

            init() {
                this.createUnits();
                this.gameLoop();

            createUnits() {
                this.allahUnits = [];
                this.emirUnits = [];

                for (let i = 0; i < this.allahSoldiers; i++) {
                    this.allahUnits.push({
                        x: Math.random() * canvas.width * 0.25,
                        y: Math.random() * canvas.height,
                        vx: 2 + Math.random() * 2,
                        vy: (Math.random() - 0.5) * 2,
                        size: 8,
                        health: 100,
                        type: 'allah'
                    });
                }

                for (let i = 0; i < this.emirSoldiers; i++) {
                    this.emirUnits.push({
                        x: canvas.width * 0.75 + Math.random() * canvas.width * 0.25,
                        y: Math.random() * canvas.height,
                        vx: -2 - Math.random() * 2,
                        vy: (Math.random() - 0.5) * 2,
                        size: 8,
                        health: 100,
                        type: 'emir'
                    });
                }
            },

            update() {
                if (this.paused || this.gameOver) return;

                this.time++;

                this.allahUnits.forEach(unit => {
                    unit.x += unit.vx;
                    unit.y += unit.vy;
                    if (unit.y < 0 || unit.y > canvas.height) unit.vy *= -1;
                    unit.y = Math.max(0, Math.min(canvas.height, unit.y));
                });

                this.emirUnits.forEach(unit => {
                    unit.x += unit.vx;
                    unit.y += unit.vy;
                    if (unit.y < 0 || unit.y > canvas.height) unit.vy *= -1;
                    unit.y = Math.max(0, Math.min(canvas.height, unit.y));
                });

                for (let i = 0; i < this.allahUnits.length; i++) {
                    for (let j = 0; j < this.emirUnits.length; j++) {
                        const dx = this.allahUnits[i].x - this.emirUnits[j].x;
                        const dy = this.allahUnits[i].y - this.emirUnits[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 50) {
                            if (Math.random() > 0.5) {
                                this.emirUnits[j].health -= 25;
                                this.playSound('hit');
                                this.totalKilled++;
                            } else {
                                this.allahUnits[i].health -= 25;
                                this.playSound('hit');
                                this.totalKilled++;
                            }
                        }
                    }
                }

                this.allahUnits = this.allahUnits.filter(u => {
                    if (u.health <= 0) {
                        this.createExplosion(u.x, u.y);
                        return false;
                    }
                    return true;
                });

                this.emirUnits = this.emirUnits.filter(u => {
                    if (u.health <= 0) {
                        this.createExplosion(u.x, u.y);
                        return false;
                    }
                    return true;
                });

                // ÇOKÇA BOMBA!
                if (this.time % 3 === 0 && Math.random() > 0.1) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    this.createExplosion(x, y);
                    this.playSound('bomb');

                    this.allahUnits.forEach(u => {
                        const dx = u.x - x;
                        const dy = u.y - y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            u.health -= 40;
                            this.totalKilled += 0.3;
                        }
                    });

                    this.emirUnits.forEach(u => {
                        const dx = u.x - x;
                        const dy = u.y - y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            u.health -= 40;
                            this.totalKilled += 0.3;
                        }
                    });
                }

                this.explosions = this.explosions.filter(e => e.life > 0);
                this.explosions.forEach(e => {
                    e.radius += 8;
                    e.life -= 0.03;
                });

                // DARK MIZAH YAZILARI (ÇOK SIKLIKI)
                if (this.time % 25 === 0) {
                    const allahKonuşma = this.allahMesajlar[Math.floor(Math.random() * this.allahMesajlar.length)];
                    const emirKonuşma = this.emirMesajlar[Math.floor(Math.random() * this.emirMesajlar.length)];
                    const nötrKonuşma = this.nötrMesajlar[Math.floor(Math.random() * this.nötrMesajlar.length)];

                    const random = Math.random();
                    
                    if (this.allahUnits.length > this.emirUnits.length) {
                        if (random < 0.5) {
                            this.addMessage('allah', allahKonuşma);
                        } else if (random < 0.8) {
                            this.addMessage('emir', emirKonuşma);
                        } else {
                            this.addMessage('neutral', nötrKonuşma);
                        }
                    } else if (this.emirUnits.length > this.allahUnits.length) {
                        if (random < 0.5) {
                            this.addMessage('emir', emirKonuşma);
                        } else if (random < 0.8) {
                            this.addMessage('allah', allahKonuşma);
                        } else {
                            this.addMessage('neutral', nötrKonuşma);
                        }
                    } else {
                        const choice = random < 0.33 ? 'allah' : random < 0.66 ? 'emir' : 'neutral';
                        if (choice === 'allah') this.addMessage('allah', allahKonuşma);
                        else if (choice === 'emir') this.addMessage('emir', emirKonuşma);
                        else this.addMessage('neutral', nötrKonuşma);
                    }
                }

                if (this.allahUnits.length === 0 && this.emirUnits.length === 0) {
                    this.endGame('berabere');
                } else if (this.allahUnits.length === 0) {
                    this.endGame('emir');
                } else if (this.emirUnits.length === 0) {
                    this.endGame('allah');
                }

                this.updateStats();
            },

            createExplosion(x, y) {
                this.explosions.push({
                    x: x,
                    y: y,
                    radius: 0,
                    life: 1,
                    maxRadius: 250
                });
            },

            addMessage(type, text) {
                const now = new Date();
                const time = String(now.getHours()).padStart(2, '0') + ':' + 
                            String(now.getMinutes()).padStart(2, '0') + ':' +
                            String(now.getSeconds()).padStart(2, '0');

                const msg = document.createElement('div');
                msg.className = `chat-message ${type}-message`;
                msg.innerHTML = `<div class="message-time">[${time}]</div>${text}`;

                if (type === 'allah') {
                    document.getElementById('allahChat').appendChild(msg);
                    if (document.getElementById('allahChat').children.length > 20) {
                        document.getElementById('allahChat').removeChild(
                            document.getElementById('allahChat').firstChild
                        );
                    }
                    document.getElementById('allahChat').scrollTop = document.getElementById('allahChat').scrollHeight;
                } else if (type === 'emir') {
                    document.getElementById('emirChat').appendChild(msg);
                    if (document.getElementById('emirChat').children.length > 20) {
                        document.getElementById('emirChat').removeChild(
                            document.getElementById('emirChat').firstChild
                        );
                    }
                    document.getElementById('emirChat').scrollTop = document.getElementById('emirChat').scrollHeight;
                } else {
                    document.getElementById('allahChat').appendChild(msg.cloneNode(true));
                    if (document.getElementById('allahChat').children.length > 20) {
                        document.getElementById('allahChat').removeChild(
                            document.getElementById('allahChat').firstChild
                        );
                    }
                    
                    document.getElementById('emirChat').appendChild(msg);
                    if (document.getElementById('emirChat').children.length > 20) {
                        document.getElementById('emirChat').removeChild(
                            document.getElementById('emirChat').firstChild
                        );
                    }
                    document.getElementById('emirChat').scrollTop = document.getElementById('emirChat').scrollHeight;
                }
            },

            endGame(winner) {
                this.gameOver = true;
                const overlay = document.getElementById('winnerOverlay');
                const content = document.getElementById('winnerContent');
                
                let title, messages, type;
                
                if (winner === 'allah') {
                    title = '🔵 ALLAH KAZANDI! 🔵';
                    messages = this.allahKazanMesajlari;
                    type = 'allah';
                } else if (winner === 'emir') {
                    title = '🔴 EMİR KAZANDI! 🔴';
                    messages = this.emirKazanMesajlari;
                    type = 'emir';
                } else {
                    title = '⚖️ BERABERE! ⚖️';
                    messages = ['Her iki ordu da yok oldu!', 'Tarih yazılamadı!'];
                    type = 'neutral';
                }

                const randomMessages = [];
                for (let i = 0; i < 4; i++) {
                    randomMessages.push(messages[Math.floor(Math.random() * messages.length)]);
                }

                let html = `
                    <div class="winner-title ${type}">${title}</div>
                    <div class="winner-messages">
                `;

                randomMessages.forEach((msg) => {
                    html += `<div class="dark-message ${type}">${msg}</div>`;
                });

                html += `
                    </div>
                    <div class="stats-display">
                        <div class="stat-item">💀 Toplam Öldü: ${Math.round(this.totalKilled)}</div>
                    </div>
                    <button class="restart-button" onclick="battle.reset(); document.getElementById('winnerOverlay').style.display = 'none';">
                        🔄 TEKRAR BAŞLA
                    </button>
                `;

                content.innerHTML = html;
                overlay.style.display = 'flex';
                
                this.playSound('victory');
            },

            playSound(type) {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    if (type === 'hit') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = 280 + Math.random() * 150;
                        gain.gain.setValueAtTime(0.08, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.04);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.04);
                    } else if (type === 'bomb') {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(450, audioContext.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(80, audioContext.currentTime + 0.8);
                        gain.gain.setValueAtTime(0.35, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
                        osc.start();
                        osc.stop(audioContext.currentTime + 0.8);
                    } else if (type === 'victory') {
                        for (let i = 0; i < 10; i++) {
                            setTimeout(() => {
                                const o = audioContext.createOscillator();
                                const g = audioContext.createGain();
                                o.connect(g);
                                g.connect(audioContext.destination);
                                o.frequency.value = 800 + i * 200;
                                g.gain.setValueAtTime(0.3, audioContext.currentTime);
                                g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                                o.start();
                                o.stop(audioContext.currentTime + 0.4);
                            }, i * 150);
                        }
                    }
                } catch (e) {}
            },

            updateStats() {
                document.getElementById('allahCount').textContent = this.allahUnits.length;
                document.getElementById('emirCount').textContent = this.emirUnits.length;
                document.getElementById('infoAllah').textContent = this.allahUnits.length;
                document.getElementById('infoEmir').textContent = this.emirUnits.length;
                document.getElementById('totalKilled').textContent = `💀 Toplam Öldü: ${Math.round(this.totalKilled)}`;
                
                const allahHealth = Math.round((this.allahUnits.length / this.allahMaxSoldiers) * 100);
                const emirHealth = Math.round((this.emirUnits.length / this.emirMaxSoldiers) * 100);
                
                document.getElementById('allahPower').textContent = allahHealth + '%';
                document.getElementById('emirPower').textContent = emirHealth + '%';

                const total = this.allahUnits.length + this.emirUnits.length;
                if (total > 0) {
                    const allahProb = Math.round((this.allahUnits.length / total) * 100);
                    const emirProb = 100 - allahProb;
                    document.getElementById('allahWinChance').textContent = allahProb + '%';
                    document.getElementById('emirWinChance').textContent = emirProb + '%';
                }

                const centerPanel = document.querySelector('.center-panel');
                centerPanel.classList.remove('allah-leading', 'emir-leading');
                
                if (this.allahUnits.length > this.emirUnits.length + 2) {
                    centerPanel.classList.add('allah-leading');
                } else if (this.emirUnits.length > this.allahUnits.length + 2) {
                    centerPanel.classList.add('emir-leading');
                }
            },

            draw() {
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#1a3a4a');
                gradient.addColorStop(0.5, '#0f1a25');
                gradient.addColorStop(1, '#1a3a4a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = 'rgba(0, 255, 136, 0.3)';
                ctx.lineWidth = 5;
                ctx.setLineDash([40, 25]);
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = '#00d4ff';
                ctx.shadowColor = 'rgba(0, 212, 255, 0.8)';
                ctx.shadowBlur = 15;
                this.allahUnits.forEach(unit => {
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, unit.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowColor = 'transparent';

                ctx.fillStyle = '#ff1744';
                ctx.shadowColor = 'rgba(255, 23, 68, 0.8)';
                ctx.shadowBlur = 15;
                this.emirUnits.forEach(unit => {
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, unit.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowColor = 'transparent';

                this.explosions.forEach(e => {
                    const gradient = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
                    gradient.addColorStop(0, `rgba(255, 220, 0, ${e.life * 0.8})`);
                    gradient.addColorStop(0.5, `rgba(255, 100, 0, ${e.life * 0.4})`);
                    gradient.addColorStop(1, `rgba(255, 23, 68, 0)`);
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.strokeStyle = `rgba(255, 220, 0, ${e.life})`;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                });

                ctx.font = 'bold 24px Arial';
                ctx.fillStyle = '#00d4ff';
                ctx.textAlign = 'left';
                ctx.fillText('🔵 ALLAH', 30, canvas.height - 20);

                ctx.fillStyle = '#ff1744';
                ctx.textAlign = 'right';
                ctx.fillText('EMİR 🔴', canvas.width - 30, canvas.height - 20);

                ctx.font = 'bold 72px Arial';
                ctx.fillStyle = '#d4af37';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(212, 175, 55, 0.7)';
                ctx.shadowBlur = 25;
                ctx.fillText(`${this.allahUnits.length} ⚔ ${this.emirUnits.length}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.shadowColor = 'transparent';
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            },

            togglePause() {
                this.paused = !this.paused;
            },

            reset() {
                this.allahSoldiers = 10;
                this.emirSoldiers = 10;
                this.totalKilled = 0;
                this.paused = false;
                this.gameOver = false;
                this.time = 0;
                this.createUnits();
                document.getElementById('allahChat').innerHTML = '';
                document.getElementById('emirChat').innerHTML = '';
                this.updateStats();
            }
        };

        battle.init();
    </script>
</body>
</html>
