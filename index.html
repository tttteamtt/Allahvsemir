<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canlı Savaş Yayını</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0a0e27;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    overflow:hidden;
}
.container{
    flex:1;
    display:grid;
    grid-template-columns:250px 1fr 250px;
    gap:8px;
    padding:8px;
}
.panel{
    background:#111a33;
    border:2px solid #00ff88;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}
.panel-header{
    padding:10px;
    text-align:center;
    font-weight:bold;
    border-bottom:1px solid #00ff88;
    color:#00ff88;
}
.chat-box{
    flex:1;
    overflow:auto;
    padding:8px;
    font-size:12px;
}
.chat-message{
    margin-bottom:6px;
}
.center{
    background:#0f1520;
    border:2px solid #00ff88;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}
.top{
    padding:10px;
    display:flex;
    justify-content:space-between;
    color:#00ff88;
    border-bottom:1px solid #00ff88;
}
canvas{
    flex:1;
    display:block;
}
.bottom{
    padding:8px;
    display:flex;
    justify-content:space-around;
    border-top:1px solid #00ff88;
    color:#00ff88;
}
.footer{
    padding:8px;
    text-align:center;
    background:#111;
    color:#00ff88;
    font-size:13px;
}
.winner{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:#00ff88;
    font-size:30px;
}
button{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    background:#00ff88;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="panel">
<div class="panel-header">🔵 MAVİ ORDU</div>
<div id="blueChat" class="chat-box"></div>
</div>

<div class="center">
<div class="top">
<div id="clock">00:00:00</div>
<div>⚔️ SAVAŞ ⚔️</div>
<div>● CANLI</div>
</div>
<canvas id="game"></canvas>
<div class="bottom">
<div>Mavi: <span id="blueCount"></span></div>
<div>Kırmızı: <span id="redCount"></span></div>
<div>💀 <span id="killed">0</span></div>
</div>
</div>

<div class="panel">
<div class="panel-header">🔴 KIRMIZI ORDU</div>
<div id="redChat" class="chat-box"></div>
</div>

</div>

<div class="footer">
👥 Ziyaretçi: <span id="visitors"></span>
</div>

<div class="winner" id="winner">
<div id="winnerText"></div>
<button onclick="restart()">Tekrar Başla</button>
</div>

<script>
/* ---- STABİL MOTOR ---- */

let visitors=parseInt(localStorage.getItem("v")||0)+1;
localStorage.setItem("v",visitors);
document.getElementById("visitors").textContent=visitors;

setInterval(()=>{
document.getElementById("clock").textContent=
new Date().toLocaleTimeString();
},1000);

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=canvas.parentElement.clientWidth;
canvas.height=canvas.parentElement.clientHeight-70;
}
window.onresize=resize;
resize();

/* ---- OYUN ---- */

let blue=[],red=[];
let killed=0;
let time=0;
let last=0;
let gameOver=false;

function create(){
blue=[];red=[];
for(let i=0;i<12;i++){
blue.push({x:Math.random()*canvas.width*0.3,
y:Math.random()*canvas.height,
vx:1,vy:(Math.random()-0.5),hp:100});
}
for(let i=0;i<12;i++){
red.push({x:canvas.width*0.7+Math.random()*canvas.width*0.3,
y:Math.random()*canvas.height,
vx:-1,vy:(Math.random()-0.5),hp:100});
}
}

function update(){
if(gameOver)return;
time++;

if(time>1800) finish();

[...blue,...red].forEach(u=>{
u.x+=u.vx;
u.y+=u.vy;
if(u.y<0||u.y>canvas.height)u.vy*=-1;
});

for(let b of blue){
for(let r of red){
let dx=b.x-r.x;
let dy=b.y-r.y;
if(dx*dx+dy*dy<900){
if(Math.random()>0.5)r.hp-=5;
else b.hp-=5;
}
}
}

let before=blue.length+red.length;
blue=blue.filter(u=>u.hp>0);
red=red.filter(u=>u.hp>0);
killed+=before-(blue.length+red.length);

if(blue.length===0||red.length===0)finish();

if(time%90===0){
addMsg(Math.random()>0.5?"blueChat":"redChat",
"⚔️ Şiddetli çarpışma!");
}

document.getElementById("blueCount").textContent=blue.length;
document.getElementById("redCount").textContent=red.length;
document.getElementById("killed").textContent=killed;
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00d4ff";
blue.forEach(u=>{
ctx.beginPath();
ctx.arc(u.x,u.y,4,0,6.28);
ctx.fill();
});
ctx.fillStyle="#ff1744";
red.forEach(u=>{
ctx.beginPath();
ctx.arc(u.x,u.y,4,0,6.28);
ctx.fill();
});
}

function loop(now){
if(now-last>33){
update();
draw();
last=now;
}
requestAnimationFrame(loop);
}

function addMsg(id,text){
let box=document.getElementById(id);
let div=document.createElement("div");
div.className="chat-message";
div.textContent="["+new Date().toLocaleTimeString()+"] "+text;
box.appendChild(div);
if(box.children.length>12)box.removeChild(box.firstChild);
box.scrollTop=box.scrollHeight;
}

function finish(){
gameOver=true;
let text=
blue.length>red.length?"🔵 MAVİ KAZANDI":
red.length>blue.length?"🔴 KIRMIZI KAZANDI":
"⚖️ BERABERE";
document.getElementById("winnerText").textContent=text;
document.getElementById("winner").style.display="flex";
}

function restart(){
killed=0;
time=0;
gameOver=false;
document.getElementById("winner").style.display="none";
create();
}

create();
requestAnimationFrame(loop);
</script>

</body>
</html>
