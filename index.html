<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allah vs Emir - Canlı Savaş Yayını</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            display: flex;
            min-height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        .container {
            width: 100%;
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 10px;
            padding: 10px;
        }

        .left-panel {
            background: linear-gradient(135deg, rgba(0, 50, 100, 0.9) 0%, rgba(15, 30, 50, 0.95) 100%);
            border: 2px solid #00d4ff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            overflow: hidden;
        }

        .right-panel {
            background: linear-gradient(135deg, rgba(100, 20, 20, 0.9) 0%, rgba(50, 15, 15, 0.95) 100%);
            border: 2px solid #ff1744;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(255, 23, 68, 0.3);
            overflow: hidden;
        }

        .panel-header {
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid currentColor;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 0 0 10px currentColor;
        }

        .left-panel .panel-header {
            color: #00d4ff;
        }

        .right-panel .panel-header {
            color: #ff1744;
        }

        .team-stats {
            padding: 15px;
            border-bottom: 2px solid currentColor;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }

        .left-panel .stat-line {
            color: #00d4ff;
        }

        .right-panel .stat-line {
            color: #ff1744;
        }

        .stat-value {
            font-weight: bold;
            font-size: 18px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .chat-message {
            padding: 10px 12px;
            border-radius: 8px;
            border-left: 4px solid;
            font-size: 12px;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
            line-height: 1.4;
            font-weight: 600;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message-time {
            font-size: 10px;
            opacity: 0.8;
            margin-bottom: 2px;
        }

        .allah-message {
            background: rgba(0, 212, 255, 0.2);
            border-left-color: #00d4ff;
            color: #00ff99;
            text-shadow: 0 0 5px rgba(0, 212, 255, 0.5);
        }

        .emir-message {
            background: rgba(255, 23, 68, 0.2);
            border-left-color: #ff1744;
            color: #ff99aa;
            text-shadow: 0 0 5px rgba(255, 23, 68, 0.5);
        }

        .neutral-message {
            background: rgba(0, 255, 136, 0.15);
            border-left-color: #00ff88;
            color: #00ff88;
        }

        .center-panel {
            background: linear-gradient(135deg, #1a2840 0%, #0f1520 100%);
            border: 2px solid #00ff88;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 2px solid #00ff88;
            background: rgba(10, 14, 27, 0.7);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff1744;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }

        .clock {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
            font-family: 'Courier New', monospace;
        }

        .title {
            flex: 1;
            text-align: center;
            color: #d4af37;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #battlefieldCanvas {
            flex: 1;
            display: block;
            background: linear-gradient(135deg, #1a3a4a 0%, #0f1a25 100%);
        }

        .battle-info {
            padding: 12px;
            border-top: 2px solid #00ff88;
            background: rgba(10, 14, 27, 0.7);
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: #00ff88;
            font-weight: bold;
            font-size: 14px;
        }

        .battle-controls {
            padding: 10px;
            border-top: 2px solid #00ff88;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .control-btn {
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            border: none;
            color: #0a0e27;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.6);
        }

        .footer {
            background: rgba(10, 14, 27, 0.95);
            border-top: 2px solid #00ff88;
            padding: 15px;
            text-align: center;
            color: #00ff88;
            font-weight: bold;
            font-size: 14px;
        }

        .winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.98) 0%, rgba(26, 31, 46, 0.98) 100%);
            z-index: 300;
            display: none;
            animation: screenFill 0.8s ease;
            backdrop-filter: blur(5px);
            overflow-y: auto;
        }

        @keyframes screenFill {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .winner-content {
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 40px 20px;
        }

        .winner-title {
            font-size: 80px;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
            animation: titleBounce 1s ease;
            letter-spacing: 3px;
        }

        @keyframes titleBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .winner-title.allah {
            color: #00d4ff;
        }

        .winner-title.emir {
            color: #ff1744;
        }

        .winner-messages {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
            animation: messagesAppear 1.5s ease;
            max-width: 1000px;
        }

        @keyframes messagesAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dark-message {
            font-size: 28px;
            font-weight: bold;
            line-height: 1.6;
        }

        .dark-message.allah {
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .dark-message.emir {
            color: #ff1744;
            text-shadow: 0 0 20px rgba(255, 23, 68, 0.5);
        }

        .restart-button {
            margin-top: 30px;
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            border: none;
            color: #0a0e27;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.6);
            transition: all 0.3s;
        }

        .restart-button:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(0, 255, 136, 0.8);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 3px;
        }

        .allah-leading {
            border-color: #00d4ff !important;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5) !important;
        }

        .emir-leading {
            border-color: #ff1744 !important;
            box-shadow: 0 0 30px rgba(255, 23, 68, 0.5) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="panel-header">🔵 ALLAH ORDUSU</div>
            <div class="team-stats">
                <div class="stat-line">
                    <span>Askerler:</span>
                    <span class="stat-value" id="allahCount">30</span>
                </div>
                <div class="stat-line">
                    <span>Güç:</span>
                    <span class="stat-value" id="allahPower">100%</span>
                </div>
                <div class="stat-line">
                    <span>Zafer:</span>
                    <span class="stat-value" id="allahWinChance">50%</span>
                </div>
            </div>
            <div class="chat-box" id="allahChat"></div>
        </div>

        <div class="center-panel">
            <div class="top-bar">
                <div class="clock" id="clock">00:00:00</div>
                <div class="title">⚔️ SAVAŞ ALANINDA ⚔️</div>
                <div class="live-indicator">● CANLI YAYIN</div>
            </div>
            <canvas id="battlefieldCanvas"></canvas>
            <div class="battle-info">
                <div>🔵 Allah: <span id="infoAllah">30</span></div>
                <div id="totalKilled">💀 Toplam Öldü: 0</div>
                <div>🔴 Emir: <span id="infoEmir">30</span></div>
            </div>
            <div class="battle-controls">
                <button class="control-btn" onclick="battle.togglePause()">⏸️ DURAKLAT</button>
                <button class="control-btn" onclick="battle.reset()">🔄 SIFIRLA</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel-header">🔴 EMİR ORDUSU</div>
            <div class="team-stats">
                <div class="stat-line">
                    <span>Askerler:</span>
                    <span class="stat-value" id="emirCount">30</span>
                </div>
                <div class="stat-line">
                    <span>Güç:</span>
                    <span class="stat-value" id="emirPower">100%</span>
                </div>
                <div class="stat-line">
                    <span>Zafer:</span>
                    <span class="stat-value" id="emirWinChance">50%</span>
                </div>
            </div>
            <div class="chat-box" id="emirChat"></div>
        </div>
    </div>

    <div class="footer">
        👥 Toplam Ziyaretçi: <span id="visitorCount">1</span> | 💀 Toplam Ölüm: <span id="footerKilled">0</span>
    </div>

    <div class="winner-overlay" id="winnerOverlay">
        <div class="winner-content" id="winnerContent"></div>
    </div>

    <script>
let visitors = parseInt(localStorage.getItem('visitors') || '1') + 1;
localStorage.setItem('visitors', visitors);
document.getElementById('visitorCount').textContent = visitors;

const canvas = document.getElementById('battlefieldCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.offsetWidth;
    canvas.height = container.offsetHeight - 80;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

setInterval(() => {
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toLocaleTimeString();
}, 1000);

const battle = {
    allahSoldiers: 12,
    emirSoldiers: 12,
    allahMaxSoldiers: 12,
    emirMaxSoldiers: 12,

    totalKilled: 0,
    paused: false,
    gameOver: false,
    time: 0,

    allahUnits: [],
    emirUnits: [],
    explosions: [],
    lastFrame: 0,

    init() {
        this.createUnits();
        this.gameLoop();
    },

    createUnits() {
        this.allahUnits = [];
        this.emirUnits = [];

        for (let i = 0; i < this.allahSoldiers; i++) {
            this.allahUnits.push({
                x: Math.random() * canvas.width * 0.3,
                y: Math.random() * canvas.height,
                vx: 1,
                vy: (Math.random() - 0.5),
                size: 4,
                health: 100
            });
        }

        for (let i = 0; i < this.emirSoldiers; i++) {
            this.emirUnits.push({
                x: canvas.width * 0.7 + Math.random() * canvas.width * 0.3,
                y: Math.random() * canvas.height,
                vx: -1,
                vy: (Math.random() - 0.5),
                size: 4,
                health: 100
            });
        }
    },

    update() {
        if (this.paused || this.gameOver) return;

        this.time++;

        // 1 DAKİKA SINIR
        if (this.time > 1800) { // 30fps * 60 saniye
            if (this.allahUnits.length > this.emirUnits.length)
                this.endGame('allah');
            else if (this.emirUnits.length > this.allahUnits.length)
                this.endGame('emir');
            else
                this.endGame('berabere');
        }

        [...this.allahUnits, ...this.emirUnits].forEach(u => {
            u.x += u.vx;
            u.y += u.vy;

            if (u.y < 0 || u.y > canvas.height) u.vy *= -1;
        });

        // Daha hafif çarpışma
        for (let i = 0; i < this.allahUnits.length; i++) {
            for (let j = 0; j < this.emirUnits.length; j++) {

                const dx = this.allahUnits[i].x - this.emirUnits[j].x;
                const dy = this.allahUnits[i].y - this.emirUnits[j].y;

                if (dx * dx + dy * dy < 625) { // 25px
                    if (Math.random() > 0.5)
                        this.emirUnits[j].health -= 4;
                    else
                        this.allahUnits[i].health -= 4;
                }
            }
        }

        this.allahUnits = this.allahUnits.filter(u => u.health > 0);
        this.emirUnits = this.emirUnits.filter(u => u.health > 0);

        // Bombalar çok azaltıldı
        if (this.time % 180 === 0 && Math.random() > 0.85) {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            this.explosions.push({ x, y, r: 0, life: 1 });

            this.allahUnits.forEach(u => {
                if ((u.x - x) ** 2 + (u.y - y) ** 2 < 10000)
                    u.health -= 10;
            });
            this.emirUnits.forEach(u => {
                if ((u.x - x) ** 2 + (u.y - y) ** 2 < 10000)
                    u.health -= 10;
            });
        }

        this.explosions = this.explosions.filter(e => e.life > 0);
        this.explosions.forEach(e => {
            e.r += 3;
            e.life -= 0.05;
        });

        this.updateStats();
    },

    draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#00d4ff";
        this.allahUnits.forEach(u => {
            ctx.beginPath();
            ctx.arc(u.x, u.y, u.size, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.fillStyle = "#ff1744";
        this.emirUnits.forEach(u => {
            ctx.beginPath();
            ctx.arc(u.x, u.y, u.size, 0, Math.PI * 2);
            ctx.fill();
        });

        this.explosions.forEach(e => {
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,150,0,${e.life})`;
            ctx.stroke();
        });
    },

    updateStats() {
        document.getElementById('allahCount').textContent = this.allahUnits.length;
        document.getElementById('emirCount').textContent = this.emirUnits.length;
        document.getElementById('infoAllah').textContent = this.allahUnits.length;
        document.getElementById('infoEmir').textContent = this.emirUnits.length;
    },

    endGame(winner) {
        this.gameOver = true;
        const overlay = document.getElementById('winnerOverlay');
        const content = document.getElementById('winnerContent');

        let title = winner === 'allah'
            ? "🔵 ALLAH KAZANDI"
            : winner === 'emir'
                ? "🔴 EMİR KAZANDI"
                : "⚖️ BERABERE";

        content.innerHTML = `
            <div class="winner-title">${title}</div>
            <button class="restart-button"
                onclick="battle.reset();document.getElementById('winnerOverlay').style.display='none';">
                🔄 TEKRAR BAŞLA
            </button>
        `;

        overlay.style.display = "flex";
    },

    togglePause() {
        this.paused = !this.paused;
    },

    reset() {
        this.time = 0;
        this.gameOver = false;
        this.createUnits();
    },

    gameLoop() {
        const now = performance.now();

        if (now - this.lastFrame > 33) { // 30 FPS
            this.update();
            this.draw();
            this.lastFrame = now;
        }

        requestAnimationFrame(() => this.gameLoop());
    }
};

battle.init();
</script>
</body>
</html>
